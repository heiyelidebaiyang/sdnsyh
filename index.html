<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>云雪星球 · 黑夜里的白羊</title>
    <style>
        /* ===== 全局重置 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
            padding: 1.5rem;
            background-image: url('image/风铃wlop鬼刀4k.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            position: relative;
        }

        #particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 1;
        }

        /* ===== 左上角菜单按钮 ===== */
        .menu-btn {
            position: fixed;
            top: 20px; left: 20px;
            z-index: 150;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 50%;
            width: 44px; height: 44px;
            color: rgba(255,255,255,0.7);
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .menu-btn:hover {
            background: rgba(255,255,255,0.18);
            color: #fff;
            transform: scale(1.05);
        }

        /* ===== 侧边导航 ===== */
        .side-nav {
            position: fixed;
            top: 0; left: -280px;
            width: 280px; height: 100vh;
            background: rgba(18,18,28,0.9);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.06);
            z-index: 200;
            transition: left 0.3s cubic-bezier(0.4,0,0.2,1);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
        }
        .side-nav.open { left: 0; }
        .nav-close {
            align-self: flex-end;
            background: none; border: none;
            color: #999; font-size: 1.6rem;
            cursor: pointer; padding: 0.2rem 0.5rem;
            margin-bottom: 2rem;
        }
        .nav-close:hover { color: #fff; }
        .nav-item {
            display: block;
            padding: 0.9rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 12px;
            color: #ccc; text-decoration: none;
            font-size: 1.05rem; transition: 0.15s;
            border: 1px solid transparent;
            background: none; width: 100%; text-align: left;
        }
        .nav-item:hover {
            background: rgba(255,255,255,0.06);
            color: #fff;
            border-color: rgba(255,255,255,0.1);
        }
        .nav-icon { margin-right: 10px; }
        .nav-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 199; display: none;
        }
        .nav-overlay.show { display: block; }

        /* ===== 卡片切换按钮（右上角） ===== */
        .toggle-btn {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 100;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 50%;
            width: 44px; height: 44px;
            color: rgba(255,255,255,0.6);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .toggle-btn:hover {
            background: rgba(255,255,255,0.18);
            color: #fff;
            transform: scale(1.05);
        }

        /* ===== 透明卡片 ===== */
        .container {
            max-width: 520px; width: 100%;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 2.8rem 2.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 8px 24px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
            position: relative; z-index: 2;
            animation: cardEntrance 0.9s cubic-bezier(0.23,1,0.32,1);
            text-align: center;
            transition: opacity 0.5s, transform 0.5s;
        }
        .container.hidden {
            opacity: 0;
            transform: scale(0.92) translateY(10px);
            pointer-events: none;
        }
        @keyframes cardEntrance {
            0% { opacity: 0; transform: scale(0.92) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .title-wrapper {
            min-height: 4rem; margin-bottom: 0.4rem;
            display: flex; align-items: baseline; justify-content: center; flex-wrap: wrap;
        }
        .site-title {
            font-size: 2.4rem; font-weight: 700; color: #fff;
            letter-spacing: -0.02em; display: inline-block; line-height: 1.2;
            text-shadow: 0 2px 30px rgba(0,0,0,0.4);
        }
        .site-title .highlight {
            background: linear-gradient(135deg, #fddb92, #d1a06e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text; text-shadow: none;
        }
        .cursor {
            display: inline-block; width: 3px; height: 2.2rem;
            background: #fddb92; margin-left: 4px;
            vertical-align: text-bottom;
            animation: blink 0.9s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; } 50% { opacity: 0; }
        }

        .sub-brand-wrapper {
            min-height: 2.8rem; display: flex;
            justify-content: center; align-items: center; margin-top: 0.2rem;
        }
        .sub-brand {
            font-size: 1rem; color: rgba(255,255,255,0.7);
            background: rgba(255,255,255,0.06); backdrop-filter: blur(4px);
            padding: 0.2rem 1.2rem; border-radius: 30px;
            font-weight: 400; letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.05);
            min-height: 2.4rem; display: flex;
            align-items: center; justify-content: center;
        }
        .sub-brand .cursor-inline {
            display: inline-block; width: 2px; height: 1rem;
            background: rgba(255,255,255,0.4); margin-left: 2px;
            animation: blink 0.9s step-end infinite;
        }

        .contact-section {
            margin-top: 1.8rem; display: flex;
            justify-content: center; gap: 1rem; flex-wrap: wrap;
        }
        .contact-btn {
            display: inline-block; padding: 0.7rem 2.2rem;
            font-size: 1rem; font-weight: 500; color: #fff;
            background: rgba(255,255,255,0.08); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 50px;
            cursor: pointer; transition: all 0.3s;
            text-decoration: none; letter-spacing: 0.5px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); user-select: none;
        }
        .contact-btn:hover {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.25);
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        .contact-btn:active { transform: scale(0.96); }
        .contact-btn .icon { margin-right: 8px; }

        .footer {
            margin-top: 2rem; padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.8rem; color: rgba(255,255,255,0.3);
            display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap;
        }
        .footer a {
            color: rgba(255,255,255,0.3); text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s, color 0.2s; cursor: pointer;
        }
        .footer a:hover {
            border-bottom-color: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.5);
        }

        /* ===== 通用弹窗 ===== */
        .modal-overlay {
            position: fixed; top:0; left:0; width:100vw; height:100vh;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            z-index: 999; display: none;
            justify-content: center; align-items: center;
            animation: modalFade 0.3s ease;
        }
        .modal-overlay.active { display: flex; }
        @keyframes modalFade { 0%{opacity:0;} 100%{opacity:1;} }

        .modal-box {
            background: rgba(20,20,28,0.88); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 24px;
            padding: 2.5rem 2.8rem; max-width: 420px; width: 90%;
            text-align: center;
            animation: modalPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }
        @keyframes modalPop {
            0%{opacity:0;transform:scale(0.85) translateY(20px);}
            100%{opacity:1;transform:scale(1) translateY(0);}
        }
        .modal-box .modal-emoji { font-size:2.8rem; margin-bottom:0.4rem; }
        .modal-box h2 { font-size:1.3rem; color:#fff; font-weight:500; margin-bottom:0.2rem; }
        .modal-box .modal-desc { font-size:0.9rem; color:rgba(255,255,255,0.4); margin-bottom:1rem; }
        .modal-box .wechat-id {
            display:inline-block; font-size:1.5rem; font-weight:600; color:#fddb92;
            background:rgba(255,255,255,0.04); padding:0.3rem 1.6rem; border-radius:12px;
            font-family:monospace; letter-spacing:2px;
            border:1px solid rgba(255,255,255,0.05); margin-bottom:1rem;
        }
        .modal-box .copy-btn {
            display:inline-block; padding:0.5rem 2rem;
            background:rgba(255,255,255,0.08); color:#fff;
            border:1px solid rgba(255,255,255,0.1); border-radius:30px;
            font-size:0.9rem; cursor:pointer; transition:0.2s;
        }
        .modal-box .copy-btn:hover { background:rgba(255,255,255,0.16); }
        .modal-box .close-btn {
            display:block; margin:1rem auto 0;
            background:none; border:none; color:rgba(255,255,255,0.25);
            font-size:0.8rem; cursor:pointer; transition:0.2s; padding:0.3rem 1rem;
        }
        .modal-box .close-btn:hover { color:rgba(255,255,255,0.5); }

        /* ===== 二维码弹窗 ===== */
        .qr-modal .modal-box { max-width:380px; padding:2rem 2rem 2.2rem; }
        .qr-modal .qr-image {
            width:100%; max-width:260px; border-radius:16px;
            margin:0.4rem auto 0.8rem; display:block;
            box-shadow:0 8px 30px rgba(0,0,0,0.3);
            border:1px solid rgba(255,255,255,0.06);
        }
        .qr-modal .qr-hint { font-size:0.85rem; color:rgba(255,255,255,0.35); margin-bottom:0.2rem; }

        /* ===== 响应式 ===== */
        @media (max-width:480px) {
            .container { padding:2rem 1.5rem; border-radius:24px; }
            .site-title { font-size:1.8rem; }
            .sub-brand { font-size:0.85rem; padding:0.15rem 0.8rem; }
            .contact-btn { padding:0.6rem 1.6rem; font-size:0.9rem; }
            .modal-box { padding:2rem 1.5rem; }
            .modal-box .wechat-id { font-size:1.2rem; padding:0.2rem 1rem; }
            .qr-modal .qr-image { max-width:200px; }
            .toggle-btn, .menu-btn { top:12px; width:38px; height:38px; font-size:1rem; }
            .toggle-btn { right:12px; } .menu-btn { left:12px; }
        }
        @media (max-width:380px) {
            .container { padding:1.5rem 1rem; }
            .site-title { font-size:1.5rem; }
            .contact-section { flex-direction:column; align-items:center; }
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <!-- 左上角菜单按钮 -->
    <button class="menu-btn" id="menuBtn" title="菜单">☰</button>

    <!-- 侧边导航 -->
    <nav class="side-nav" id="sideNav">
        <button class="nav-close" id="navClose">✕</button>
        <a class="nav-item" href="index.html"><span class="nav-icon">🏠</span> 首页</a>
        <a class="nav-item" href="html/software.html"><span class="nav-icon">📱</span> 软件下载</a>
        <a class="nav-item" href="html/github.html"><span class="nav-icon">🐙</span> GitHub</a>
        <a class="nav-item" href="html/author.html"><span class="nav-icon">✍️</span> 作者的话</a>
        <a class="nav-item" href="html/contact.html"><span class="nav-icon">💬</span> 联系作者</a>
    </nav>
    <div class="nav-overlay" id="navOverlay"></div>

    <!-- 右上角隐藏卡片按钮 -->
    <button class="toggle-btn" id="toggleBtn" title="隐藏/显示界面">👁️</button>

    <!-- 主卡片 -->
    <div class="container" id="mainCard">
        <div class="title-wrapper">
            <h1 class="site-title" id="typewriter">
                <span class="highlight">云雪</span>星球
            </h1>
            <span class="cursor" id="cursor"></span>
        </div>
        <div class="sub-brand-wrapper">
            <div class="sub-brand" id="subBrand">
                <span id="subText"></span><span class="cursor-inline" id="subCursor"></span>
            </div>
        </div>
        <div class="contact-section">
            <button class="contact-btn" id="contactBtn">
                <span class="icon">💬</span> 联系我
            </button>
        </div>
        <div class="footer">
            <span>© 2026 · 云雪星球</span>
            <a id="fishBtn">🌿 青草</a>
            <a id="gzhBtn">📧 白羊信</a>
        </div>
    </div>

    <!-- 微信弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <div class="modal-emoji">🐑</div>
            <h2>找到我</h2>
            <p class="modal-desc">加微信请备注「云雪星球」</p>
            <div class="wechat-id">iPYJ1202</div>
            <button class="copy-btn" id="copyBtn">📋 复制微信号</button>
            <button class="close-btn" id="closeModalBtn">关闭</button>
        </div>
    </div>

    <!-- 青草弹窗 -->
    <div class="modal-overlay qr-modal" id="qrModalOverlay">
        <div class="modal-box">
            <div class="modal-emoji">🌿</div>
            <h2>请我吃青草</h2>
            <p class="modal-desc">扫码支持一下～</p>
            <img class="qr-image" src="image/wechat_pay_qr.png" alt="收款二维码" />
            <p class="qr-hint">💰 随缘打赏，白羊感谢</p>
            <button class="close-btn" id="closeQrBtn">关闭</button>
        </div>
    </div>

    <!-- 白羊信弹窗 -->
    <div class="modal-overlay qr-modal" id="gzhModalOverlay">
        <div class="modal-box">
            <div class="modal-emoji">📧</div>
            <h2>关注公众号</h2>
            <p class="modal-desc">获取最新白羊资讯</p>
            <img class="qr-image" src="image/gzh_qr.png" alt="公众号二维码" />
            <p class="qr-hint">📮 云雪星球 · 官方号</p>
            <button class="close-btn" id="closeGzhBtn">关闭</button>
        </div>
    </div>

    <!-- 脚本 -->
    <script>
        // 粒子特效
        (function() {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let width, height, particles = [];
            const particleCount = 120;
            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height - height;
                    this.size = Math.random() * 3 + 1.5;
                    this.speed = Math.random() * 2.5 + 1.2;
                    this.opacity = Math.random() * 0.5 + 0.15;
                }
                update() {
                    this.y += this.speed;
                    if (this.y > height) { this.reset(); this.y = -this.size; }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255,255,255,${this.opacity})`;
                    ctx.fill();
                }
            }
            function init() {
                particles = [];
                for (let i=0; i<particleCount; i++) {
                    let p = new Particle();
                    p.y = Math.random() * height;
                    particles.push(p);
                }
            }
            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                init();
            }
            function animate() {
                ctx.clearRect(0,0,width,height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            window.addEventListener('resize', resize);
            resize(); animate();
        })();

        // 打字机标题
        (function() {
            const titleEl = document.getElementById('typewriter');
            const cursor = document.getElementById('cursor');
            const normalSpan = document.createElement('span');
            titleEl.innerHTML = '';
            const hlSpan = document.createElement('span');
            hlSpan.className = 'highlight';
            hlSpan.textContent = '云雪';
            titleEl.appendChild(hlSpan);
            titleEl.appendChild(normalSpan);
            let index = 0;
            const text = '星球';
            function type() {
                if (index < text.length) {
                    normalSpan.textContent += text.charAt(index);
                    index++;
                    setTimeout(type, 100);
                } else {
                    cursor.style.animation = 'blink 0.9s step-end infinite';
                }
            }
            setTimeout(type, 400);
            cursor.style.animation = 'blink 0.9s step-end infinite';
        })();

        // 循环打字副标题
        (function() {
            const subText = document.getElementById('subText');
            const fullText = '❄ 永久不退的热情 才是天分';
            let charIndex = 0, isDeleting = false, timer;
            function loop() {
                if (!isDeleting) {
                    if (charIndex < fullText.length) {
                        subText.textContent = fullText.substring(0, charIndex+1);
                        charIndex++;
                        timer = setTimeout(loop, 80);
                    } else {
                        isDeleting = true;
                        timer = setTimeout(loop, 2500);
                    }
                } else {
                    if (charIndex > 0) {
                        subText.textContent = fullText.substring(0, charIndex-1);
                        charIndex--;
                        timer = setTimeout(loop, 40);
                    } else {
                        isDeleting = false;
                        timer = setTimeout(loop, 800);
                    }
                }
            }
            setTimeout(loop, 1600);
        })();

        // 菜单交互
        const menuBtn = document.getElementById('menuBtn');
        const sideNav = document.getElementById('sideNav');
        const navClose = document.getElementById('navClose');
        const navOverlay = document.getElementById('navOverlay');
        function openNav() {
            sideNav.classList.add('open');
            navOverlay.classList.add('show');
            document.body.style.overflow = 'hidden';
        }
        function closeNav() {
            sideNav.classList.remove('open');
            navOverlay.classList.remove('show');
            document.body.style.overflow = '';
        }
        menuBtn.addEventListener('click', openNav);
        navClose.addEventListener('click', closeNav);
        navOverlay.addEventListener('click', closeNav);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && sideNav.classList.contains('open')) closeNav();
        });

        // 卡片隐藏/显示
        const mainCard = document.getElementById('mainCard');
        const toggleBtn = document.getElementById('toggleBtn');
        let hidden = false;
        toggleBtn.addEventListener('click', () => {
            hidden = !hidden;
            mainCard.classList.toggle('hidden', hidden);
        });

        // 弹窗交互 (微信)
        const modal = document.getElementById('modalOverlay');
        const contactBtn = document.getElementById('contactBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const copyBtn = document.getElementById('copyBtn');
        const wechatId = 'iPYJ1202';
        function openModal() { modal.classList.add('active'); document.body.style.overflow = 'hidden'; }
        function closeModal() { modal.classList.remove('active'); document.body.style.overflow = ''; }
        contactBtn.addEventListener('click', openModal);
        closeModalBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(wechatId).then(() => {
                copyBtn.textContent = '✅ 已复制！';
                setTimeout(() => { copyBtn.textContent = '📋 复制微信号'; }, 2000);
            }).catch(() => {
                const input = document.createElement('input');
                input.value = wechatId;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                copyBtn.textContent = '✅ 已复制！';
                setTimeout(() => { copyBtn.textContent = '📋 复制微信号'; }, 2000);
            });
        });

        // 青草弹窗
        const qrModal = document.getElementById('qrModalOverlay');
        const fishBtn = document.getElementById('fishBtn');
        const closeQrBtn = document.getElementById('closeQrBtn');
        function openQrModal() { qrModal.classList.add('active'); document.body.style.overflow = 'hidden'; }
        function closeQrModal() { qrModal.classList.remove('active'); document.body.style.overflow = ''; }
        fishBtn.addEventListener('click', openQrModal);
        closeQrBtn.addEventListener('click', closeQrModal);
        qrModal.addEventListener('click', (e) => { if(e.target === qrModal) closeQrModal(); });

        // 白羊信弹窗
        const gzhModal = document.getElementById('gzhModalOverlay');
        const gzhBtn = document.getElementById('gzhBtn');
        const closeGzhBtn = document.getElementById('closeGzhBtn');
        function openGzhModal() { gzhModal.classList.add('active'); document.body.style.overflow = 'hidden'; }
        function closeGzhModal() { gzhModal.classList.remove('active'); document.body.style.overflow = ''; }
        gzhBtn.addEventListener('click', openGzhModal);
        closeGzhBtn.addEventListener('click', closeGzhModal);
        gzhModal.addEventListener('click', (e) => { if(e.target === gzhModal) closeGzhModal(); });

        // ESC 关闭弹窗
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (modal.classList.contains('active')) closeModal();
                if (qrModal.classList.contains('active')) closeQrModal();
                if (gzhModal.classList.contains('active')) closeGzhModal();
            }
        });
    </script>
</body>
</html>
