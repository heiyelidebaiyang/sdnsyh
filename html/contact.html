        .contact-card {
            flex: 1;
            min-width: 220px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 1.5rem 1.2rem;
            text-align: center;
            transition: background 0.2s;
        }

        .contact-card:hover {
            background: rgba(255,255,255,0.08);
        }

        .card-icon {
            font-size: 2rem;

        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 500;
            color: #fff;
            margin-bottom: 0.3rem;

        .card-desc {

            margin-bottom: 1rem;
        }

        .wechat-id, .email-id {
            font-size: 1.3rem;

            font-family: monospace;

            word-break: break-all;
        }

        .email-id {

        }

        .copy-btn {
            padding: 0.5rem 1.5rem;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: #ddd;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
            margin: 0.2rem;
        }

        .copy-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        .divider {
            width: 60%;
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 0.8rem auto;
        }

        .qr-image {
            width: 100%;
            max-width: 180px;
            border-radius: 12px;
            margin: 0.5rem auto;
            display: block;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .qr-hint {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.35);
            margin-top: 0.4rem;

        @media (max-width: 700px) {

                width: 100%;

                align-items: center;

            }
            .sidebar-logo {
                width: 40px;
                height: 40px;

            }
            .nav-item {

                padding: 0.5rem 0.9rem;

            }
            .main-content {
                margin-left: 0;
                padding: 1.5rem 1.2rem;
            }
            .contact-cards {

    </style>

    <script>
        // 粒子特效
        (function() {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let width, height, particles = [];
            const particleCount = 120;

            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height - height;
                    this.size = Math.random() * 3 + 1.5;
                    this.speed = Math.random() * 2.5 + 1.2;
                    this.opacity = Math.random() * 0.5 + 0.15;
                }
                update() {
                    this.y += this.speed;
                    if (this.y > height) { this.reset(); this.y = -this.size; }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(255,255,255,${this.opacity})`;
                    ctx.fill();
                }
            }
            function init() {
                particles = [];
                for (let i=0; i<particleCount; i++) {
                    let p = new Particle();
                    p.y = Math.random() * height;
                    particles.push(p);
                }
            }
            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                init();
            }
            function animate() {
                ctx.clearRect(0,0,width,height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            window.addEventListener('resize', resize);
            resize(); animate();
        })();

        // 复制微信号
        document.getElementById('copyWechatBtn').addEventListener('click', () => {
            navigator.clipboard.writeText('iPYJ1202').then(() => {
                const status = document.getElementById('copyWechatStatus');
                status.textContent = '✅ 已复制';
                setTimeout(() => { status.textContent = ''; }, 2000);
            });
        });

        // 复制邮箱
        document.getElementById('copyEmailBtn').addEventListener('click', () => {
            navigator.clipboard.writeText('980766365@qq.com').then(() => {
                const status = document.getElementById('copyEmailStatus');
                status.textContent = '✅ 已复制';
                setTimeout(() => { status.textContent = ''; }, 2000);
            });
        });
    </script>
