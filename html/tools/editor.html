<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>微信公众号文章编辑器 · 功能完整版</title>
  <style>
    /* ========== 全局变量与基础样式 ========== */
    :root {
      --primary: #07c160;
      --primary-hover: #06ad56;
      --primary-light: #e8f8ef;
      --bg: #f5f5f5;
      --bg-white: #fff;
      --border: #e0e0e0;
      --text: #333;
      --text-secondary: #666;
      --text-muted: #999;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 4px 20px rgba(0, 0, 0, 0.12);
      --radius: 8px;
      --radius-sm: 4px;
      --transition: 0.2s ease;
      --editor-max-width: 680px;
      --font-stack: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-stack); background: #e8ecf1; color: var(--text); min-height: 100vh; overflow: hidden; }

    .app-header { background: #fff; border-bottom: 1px solid var(--border); height: 52px; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; z-index: 100; }
    .app-header .logo { font-size: 18px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    .app-body { display: flex; height: calc(100vh - 52px); }

    .sidebar-left { width: 220px; background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .sidebar-tab { flex: 1; padding: 12px 8px; text-align: center; font-size: 13px; cursor: pointer; color: var(--text-secondary); border-bottom: 2px solid transparent; transition: var(--transition); background: none; border: none; }
    .sidebar-tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
    .sidebar-tab:hover { color: var(--primary); }
    .sidebar-content { flex: 1; overflow-y: auto; padding: 12px; }
    .section-title { font-size: 12px; color: var(--text-muted); margin: 12px 0 8px; padding-left: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .template-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px; margin-bottom: 8px; cursor: pointer; transition: var(--transition); font-size: 13px; }
    .template-card:hover { border-color: var(--primary); background: var(--primary-light); box-shadow: 0 1px 4px rgba(7, 193, 96, 0.12); }
    .template-preview { background: #fff; border-radius: 2px; padding: 8px; margin-bottom: 6px; font-size: 11px; color: var(--text-muted); border: 1px dashed #ddd; min-height: 40px; display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.4; }
    .template-name { font-weight: 500; font-size: 12px; }
    .color-presets { display: flex; flex-wrap: wrap; gap: 6px; }
    .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: var(--transition); }
    .color-dot:hover { border-color: #999; transform: scale(1.1); }

    .editor-main { flex: 1; display: flex; flex-direction: column; background: #e8ecf1; min-width: 0; }
    .editor-toolbar { background: #fff; border-bottom: 1px solid var(--border); padding: 6px 12px; display: flex; flex-wrap: wrap; gap: 2px; align-items: center; flex-shrink: 0; }
    .toolbar-group { display: flex; gap: 1px; align-items: center; padding: 0 4px; }
    .toolbar-divider { width: 1px; height: 24px; background: #e8e8e8; margin: 0 4px; }
    .tool-btn { width: 32px; height: 32px; border: none; background: transparent; border-radius: var(--radius-sm); cursor: pointer; color: #555; font-size: 15px; display: flex; align-items: center; justify-content: center; transition: var(--transition); position: relative; flex-shrink: 0; }
    .tool-btn:hover { background: #f0f0f0; color: #333; }
    .tool-btn.active { background: #e6e6e6; color: var(--primary); }
    .tool-select, .tool-font-input { height: 32px; border: 1px solid #e0e0e0; border-radius: var(--radius-sm); padding: 0 6px; font-size: 13px; color: #555; background: #fff; outline: none; }
    .tool-font-input { width: 110px; }
    .color-picker-wrap { position: relative; display: flex; align-items: center; }
    .color-indicator { width: 18px; height: 3px; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); border-radius: 2px; }
    .editor-scroll { flex: 1; overflow-y: auto; padding: 24px 40px; display: flex; justify-content: center; align-items: flex-start; }
    .editor-card { background: #fff; width: 100%; max-width: var(--editor-max-width); min-height: calc(100% - 48px); box-shadow: var(--shadow-lg); border-radius: 4px; padding: 32px 28px 80px; position: relative; }
    .article-meta { margin-bottom: 20px; }
    .article-title-input { width: 100%; border: none; border-bottom: 1px dashed transparent; font-size: 22px; font-weight: 700; color: #1a1a1a; padding: 8px 0; outline: none; resize: none; line-height: 1.4; transition: var(--transition); overflow: hidden; }
    .article-title-input:focus { border-bottom-color: var(--primary); }
    .article-author-input { width: 100%; border: none; font-size: 14px; color: #666; padding: 4px 0; outline: none; margin-bottom: 16px; }
    .editor-content { outline: none; min-height: 400px; font-size: 15px; line-height: 1.8; color: #3e3e3e; word-break: break-word; cursor: text; }
    .editor-content:empty::before { content: '在这里开始写作...\A按 Ctrl+V 可粘贴内容'; color: #ccc; font-size: 14px; white-space: pre; }
    .editor-content h1 { font-size: 22px; font-weight: 700; margin: 16px 0 10px; }
    .editor-content h2 { font-size: 20px; font-weight: 700; margin: 14px 0 8px; }
    .editor-content h3 { font-size: 17px; font-weight: 600; margin: 12px 0 8px; }
    .editor-content p { margin: 0 0 8px; }
    .editor-content blockquote { border-left: 3px solid #07c160; padding: 8px 16px; margin: 12px 0; background: #f9fdfb; color: #666; }
    .editor-content img { max-width: 100%; height: auto; display: block; margin: 16px auto; border-radius: 4px; cursor: pointer; }

    .sidebar-right { width: 300px; background: #fff; border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
    .panel-section { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
    .panel-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 500; }
    .cover-upload { width: 100%; aspect-ratio: 2.35/1; background: #f7f8fa; border: 2px dashed #e0e0e0; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-direction: column; gap: 6px; font-size: 13px; color: #999; position: relative; overflow: hidden; }
    .cover-upload img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .cover-upload .remove-cover { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.5); color: #fff; border: none; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 2; }
    .cover-upload.has-image:hover .remove-cover { display: flex; }
    .action-btn { width: 100%; padding: 10px 16px; border: none; border-radius: var(--radius-sm); font-size: 14px; cursor: pointer; font-weight: 500; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 8px; }
    .action-btn.primary { background: var(--primary); color: #fff; }
    .action-btn.primary:hover { background: var(--primary-hover); }
    .action-btn.secondary { background: #f0f0f0; color: #555; }
    .action-btn.outline { background: #fff; color: var(--primary); border: 1px solid var(--primary); }
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 24px; border-radius: 20px; font-size: 14px; z-index: 2000; pointer-events: none; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    /* 云雪星球风格 */
    .yunxue-title { font-size: 26px; font-weight: 700; text-align: center; background: linear-gradient(135deg, #4a1a6b, #6b2fa0, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .yunxue-blockquote { border-left: 4px solid #8b5cf6; padding: 10px 20px; margin: 16px 0; background: #f8f5ff; border-radius: 0 8px 8px 0; color: #2d2a3e; }
    .yunxue-footer { text-align: center; font-size: 13px; color: #8b8ba0; margin-top: 20px; padding-top: 16px; border-top: 1px solid #edeaf5; }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="4" fill="#07c160"/><path d="M7 12h10M7 8h10M7 16h6" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
      微信编辑器
    </div>
    <div class="header-actions">
      <button class="tool-btn" onclick="saveDraft()" title="保存草稿 (Ctrl+S)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
      </button>
      <span id="saveStatus" style="font-size:12px; color:#999;"></span>
    </div>
  </header>

  <div class="app-body">
    <!-- 左侧面板 -->
    <aside class="sidebar-left">
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" onclick="switchTab('styles', this)">样式</button>
        <button class="sidebar-tab" onclick="switchTab('templates', this)">模板</button>
        <button class="sidebar-tab" onclick="switchTab('colors', this)">配色</button>
        <button class="sidebar-tab" onclick="switchTab('mytemplates', this)">我的</button>
      </div>
      <div class="sidebar-content">
        <div id="panel-styles">
          <div class="section-title">标题样式</div>
          <div class="template-card" onclick="insertTemplate('h1','主标题')">
            <div class="template-preview"><b style="font-size:20px">主标题</b></div>
            <div class="template-name">一级标题</div>
          </div>
          <div class="template-card" onclick="insertTemplate('h2','副标题')">
            <div class="template-preview"><b style="font-size:18px">副标题</b></div>
            <div class="template-name">二级标题</div>
          </div>
          <div class="template-card" onclick="insertTemplate('h3','小标题')">
            <div class="template-preview"><b style="font-size:16px">小标题</b></div>
            <div class="template-name">三级标题</div>
          </div>
          <div class="section-title">正文样式</div>
          <div class="template-card" onclick="insertTemplate('quote','引用文字')">
            <div class="template-preview" style="border-left:3px solid #07c160; padding-left:8px; color:#666">引用文字</div>
            <div class="template-name">引用块</div>
          </div>
          <div class="template-card" onclick="insertDivider()">
            <div class="template-preview">──────</div>
            <div class="template-name">分隔线</div>
          </div>
        </div>

        <div id="panel-templates" style="display:none;">
          <div class="section-title">文章模板</div>
          <div class="template-card" onclick="insertFullTemplate('news')">📰 标准图文模板</div>
          <div class="template-card" onclick="insertFullTemplate('holiday')">🎉 节日祝福模板</div>
          <div class="template-card" onclick="insertFullTemplate('product')">🛒 产品介绍模板</div>
          <div class="template-card" onclick="insertFullTemplate('knowledge')">📚 知识干货模板</div>
          <div class="template-card" onclick="insertFullTemplate('yunxue')" style="border-color:#8b5cf6; background:#f8f5ff;">
            <span style="color:#4a1a6b; font-weight:600;">🌍 云雪星球 · 清华紫风格</span>
          </div>
        </div>

        <div id="panel-colors" style="display:none;">
          <div class="section-title">字体颜色</div>
          <div class="color-presets">
            <span class="color-dot" style="background:#07c160" onclick="setFontColor('#07c160')"></span>
            <span class="color-dot" style="background:#e64340" onclick="setFontColor('#e64340')"></span>
            <span class="color-dot" style="background:#576b95" onclick="setFontColor('#576b95')"></span>
            <span class="color-dot" style="background:#8b5cf6" onclick="setFontColor('#8b5cf6')"></span>
            <span class="color-dot" style="background:#3e3e3e" onclick="setFontColor('#3e3e3e')"></span>
            <span class="color-dot" style="background:#4a1a6b" onclick="setFontColor('#4a1a6b')"></span>
          </div>
          <div class="section-title">背景颜色</div>
          <div class="color-presets">
            <span class="color-dot" style="background:#e8f8ef" onclick="setBgColor('#e8f8ef')"></span>
            <span class="color-dot" style="background:#f5f0ff" onclick="setBgColor('#f5f0ff')"></span>
            <span class="color-dot" style="background:#fffacd" onclick="setBgColor('#fffacd')"></span>
            <span class="color-dot" style="background:transparent; border:2px dashed #ccc;" onclick="setBgColor('transparent')"></span>
          </div>
        </div>

        <div id="panel-mytemplates" style="display:none;">
          <div class="section-title">📥 导入模板</div>
          <input type="text" id="templateUrlInput" class="tool-font-input" style="width:100%; margin-bottom:8px;" placeholder="135编辑器模板ID或URL">
          <div style="display:flex; gap:6px; margin-bottom:8px;">
            <button class="action-btn primary" style="flex:1; margin:0; padding:6px;" onclick="fetchTemplate()">获取模板</button>
            <button class="action-btn secondary" style="flex:1; margin:0; padding:6px;" onclick="showPasteDialog()">粘贴源码</button>
          </div>
          <div class="section-title">📚 我的模板 <span id="myTemplateCount">0个</span></div>
          <div id="myTemplateList" style="font-size:12px; color:#999; text-align:center; padding:20px 0;">暂无模板，导入后显示</div>
          <button class="action-btn secondary" style="margin-top:8px; font-size:12px;" onclick="clearAllMyTemplates()">清空全部模板</button>
        </div>
      </div>
    </aside>

    <!-- 中间编辑区 -->
    <main class="editor-main">
      <div class="editor-toolbar">
        <button class="tool-btn" onclick="exec('undo')" title="撤销">↩</button>
        <button class="tool-btn" onclick="exec('redo')" title="重做">↪</button>
        <span class="toolbar-divider"></span>
        <select class="tool-select" onchange="exec('fontSize', this.value)" title="字号">
          <option value="2">14px</option><option value="3" selected>15px</option><option value="4">18px</option><option value="5">22px</option>
        </select>
        <span class="toolbar-divider"></span>
        <button class="tool-btn" onclick="exec('bold')" title="加粗 (Ctrl+B)"><b>B</b></button>
        <button class="tool-btn" onclick="exec('italic')" title="斜体 (Ctrl+I)"><i>I</i></button>
        <button class="tool-btn" onclick="exec('underline')" title="下划线 (Ctrl+U)"><u>U</u></button>
        <span class="toolbar-divider"></span>
        <div class="color-picker-wrap">
          <button class="tool-btn" onclick="document.getElementById('fontColorPicker').click()" title="字体颜色">A<span class="color-indicator" id="fontColorIndicator" style="background:#3e3e3e"></span></button>
          <input type="color" id="fontColorPicker" value="#3e3e3e" style="position:absolute;opacity:0;width:0;height:0;" onchange="setFontColor(this.value)">
        </div>
        <div class="color-picker-wrap">
          <button class="tool-btn" onclick="document.getElementById('bgColorPicker').click()" title="背景颜色">BG<span class="color-indicator" id="bgColorIndicator" style="background:transparent"></span></button>
          <input type="color" id="bgColorPicker" value="#ffff00" style="position:absolute;opacity:0;width:0;height:0;" onchange="setBgColor(this.value)">
        </div>
        <span class="toolbar-divider"></span>
        <button class="tool-btn" onclick="exec('justifyLeft')" title="左对齐">≡</button>
        <button class="tool-btn" onclick="exec('justifyCenter')" title="居中">☰</button>
        <button class="tool-btn" onclick="indentFirstLine()" title="首行缩进">↘</button>
        <span class="toolbar-divider"></span>
        <button class="tool-btn" onclick="exec('insertUnorderedList')" title="无序列表">•</button>
        <button class="tool-btn" onclick="exec('insertOrderedList')" title="有序列表">1.</button>
        <button class="tool-btn" onclick="exec('formatBlock', '<BLOCKQUOTE>')" title="引用">❝</button>
        <span class="toolbar-divider"></span>
        <button class="tool-btn" onclick="document.getElementById('imageInput').click()" title="插入图片">🖼</button>
        <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="insertImage(event)">
        <button class="tool-btn" onclick="insertDivider()" title="插入分隔线">—</button>
        <button class="tool-btn" onclick="showLinkDialog()" title="插入链接">🔗</button>
        <span class="toolbar-divider"></span>
        <button class="tool-btn" onclick="showPreview()" title="手机预览" style="color:#07c160;">📱</button>
        <button class="tool-btn" onclick="copyToWechat()" title="复制到微信" style="color:#07c160; font-weight:600; width:auto; padding:0 8px;">📋复制</button>
      </div>

      <div class="editor-scroll">
        <div class="editor-card">
          <textarea class="article-title-input" id="articleTitle" placeholder="请输入文章标题" rows="1" oninput="autoResize(this)"></textarea>
          <input class="article-author-input" id="articleAuthor" placeholder="作者名称（选填）">
          <div class="editor-content" id="editorContent" contenteditable="true"></div>
        </div>
      </div>
    </main>

    <!-- 右侧面板 -->
    <aside class="sidebar-right">
      <div class="panel-section">
        <div class="panel-label">📷 封面图片</div>
        <div class="cover-upload" id="coverUpload" onclick="document.getElementById('coverInput').click()">
          <span>点击上传封面</span><span style="font-size:11px;">900×383</span>
          <button class="remove-cover" onclick="event.stopPropagation(); removeCover();">×</button>
        </div>
        <input type="file" id="coverInput" accept="image/*" style="display:none" onchange="setCoverImage(event)">
      </div>
      <div class="panel-section">
        <div class="panel-label">📝 摘要</div>
        <textarea class="summary-textarea" id="articleSummary" placeholder="选填，不填默认抓取正文前54字" maxlength="120" oninput="updateCharCount()"></textarea>
        <div style="font-size:11px; color:#bbb; text-align:right;"><span id="charCount">0</span>/120</div>
      </div>
      <div class="panel-section">
        <div class="panel-label">📊 文章信息</div>
        <div>字数：<span id="wordCount">0</span> | 段落：<span id="paraCount">0</span> | 图片：<span id="imgCount">0</span></div>
        <div>阅读时间：约 <span id="readTime">0</span> 分钟</div>
      </div>
      <div class="panel-section">
        <button class="action-btn primary" onclick="copyToWechat()">📋 复制到微信公众号</button>
        <button class="action-btn outline" onclick="showPreview()">📱 手机预览</button>
        <button class="action-btn secondary" onclick="exportHTML()">💾 导出 HTML 文件</button>
        <button class="action-btn secondary" onclick="clearAll()">🗑️ 清空内容</button>
      </div>
    </aside>
  </div>

  <div id="modalContainer"></div>

  <script>
    (function() {
      // ---------- 核心元素 ----------
      const editor = document.getElementById('editorContent');
      const titleInput = document.getElementById('articleTitle');
      const authorInput = document.getElementById('articleAuthor');
      const summaryInput = document.getElementById('articleSummary');
      const coverUpload = document.getElementById('coverUpload');
      let coverDataUrl = null;

      // ---------- 自动保存 ----------
      function autoSave() {
        clearTimeout(window._autoSaveTimer);
        window._autoSaveTimer = setTimeout(() => { saveDraft(); updateArticleInfo(); }, 500);
      }
      editor.addEventListener('input', autoSave);
      titleInput.addEventListener('input', autoSave);
      authorInput.addEventListener('input', autoSave);
      summaryInput.addEventListener('input', autoSave);

      // ---------- 工具函数 ----------
      window.exec = function(command, value) {
        editor.focus();
        document.execCommand(command, false, value || null);
      };

      // ---------- 字体颜色 (修复：选区包裹 / 无选区设置后续输入颜色) ----------
      window.setFontColor = function(color) {
        editor.focus();
        const sel = window.getSelection();
        if (sel.rangeCount && !sel.isCollapsed) {
          const range = sel.getRangeAt(0);
          const span = document.createElement('span');
          span.style.color = color;
          try {
            range.surroundContents(span);
          } catch (e) {
            const fragment = range.extractContents();
            span.appendChild(fragment);
            range.insertNode(span);
          }
          sel.removeAllRanges();
          sel.addRange(range);
        } else {
          document.execCommand('styleWithCSS', false, true);
          document.execCommand('foreColor', false, color);
        }
        document.getElementById('fontColorIndicator').style.background = color;
        document.getElementById('fontColorPicker').value = color;
        saveDraft();
      };

      // 背景颜色 (同上)
      window.setBgColor = function(color) {
        editor.focus();
        const sel = window.getSelection();
        if (sel.rangeCount && !sel.isCollapsed) {
          const range = sel.getRangeAt(0);
          const span = document.createElement('span');
          span.style.backgroundColor = color;
          try {
            range.surroundContents(span);
          } catch (e) {
            const fragment = range.extractContents();
            span.appendChild(fragment);
            range.insertNode(span);
          }
          sel.removeAllRanges();
          sel.addRange(range);
        } else {
          document.execCommand('styleWithCSS', false, true);
          document.execCommand('backColor', false, color);
        }
        document.getElementById('bgColorIndicator').style.background = color === 'transparent' ? 'transparent' : color;
        saveDraft();
      };

      // ---------- 样式插入/替换 ----------
      window.insertTemplate = function(type, text) {
        editor.focus();
        const sel = window.getSelection();
        if (sel.rangeCount && !sel.isCollapsed) {
          const range = sel.getRangeAt(0);
          let wrapper;
          switch(type) {
            case 'h1': wrapper = document.createElement('h1'); break;
            case 'h2': wrapper = document.createElement('h2'); break;
            case 'h3': wrapper = document.createElement('h3'); break;
            case 'quote': wrapper = document.createElement('blockquote'); break;
            default: wrapper = document.createElement('p'); break;
          }
          wrapper.textContent = text || sel.toString();
          range.deleteContents();
          range.insertNode(wrapper);
          range.selectNodeContents(wrapper);
          sel.removeAllRanges();
          sel.addRange(range);
        } else {
          let html = '';
          switch(type) {
            case 'h1': html = `<h1>${text}</h1><p><br></p>`; break;
            case 'h2': html = `<h2>${text}</h2><p><br></p>`; break;
            case 'h3': html = `<h3>${text}</h3><p><br></p>`; break;
            case 'quote': html = `<blockquote>${text}</blockquote><p><br></p>`; break;
          }
          insertHtmlAtEnd(html);
        }
        updateArticleInfo();
        saveDraft();
      };

      window.insertDivider = function() { insertHtmlAtEnd('<hr>'); };

      function insertHtmlAtEnd(html) {
        editor.focus();
        const range = document.createRange();
        range.selectNodeContents(editor);
        range.collapse(false);
        const temp = document.createElement('div');
        temp.innerHTML = html;
        const frag = document.createDocumentFragment();
        while (temp.firstChild) frag.appendChild(temp.firstChild);
        range.insertNode(frag);
        range.collapse(false);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        editor.scrollTop = editor.scrollHeight;
        saveDraft();
      }

      window.insertFullTemplate = function(type) {
        let html = '';
        switch(type) {
          case 'news': html = '<h2 style="text-align:center">📰 标题</h2><p>正文内容...</p><hr><p style="text-align:center;color:#999">👇 关注我们</p>'; break;
          case 'holiday': html = '<h1 style="text-align:center;color:#e64340">🎉 节日快乐</h1><blockquote>祝福语...</blockquote>'; break;
          case 'product': html = '<h2>🛒 产品名称</h2><ul><li>亮点一</li><li>亮点二</li></ul>'; break;
          case 'knowledge': html = '<h2>📚 知识主题</h2><ol><li>要点一</li><li>要点二</li></ol>'; break;
          case 'yunxue': html = '<div class="yunxue-title">🌍 云雪星球 · 工具分享</div><div class="yunxue-blockquote">善于用工具是人类的智慧。</div><p style="text-indent:2em">在这个信息爆炸的时代，高效工具至关重要。</p><div class="yunxue-footer"><span>✦ 云雪星球 ✦</span></div>'; break;
        }
        insertHtmlAtEnd(html);
        showToast('✅ 模板已插入');
      };

      // ---------- 侧边栏切换 ----------
      window.switchTab = function(tab, btn) {
        document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        ['styles','templates','colors','mytemplates'].forEach(id => {
          document.getElementById('panel-'+id).style.display = id === tab ? 'block' : 'none';
        });
        if (tab === 'mytemplates') renderMyTemplates();
      };

      // ---------- 我的模板管理 ----------
      const MY_KEY = 'wechat_my_templates';
      function getMyTemplates() { return JSON.parse(localStorage.getItem(MY_KEY) || '[]'); }
      function saveMyTemplates(arr) { localStorage.setItem(MY_KEY, JSON.stringify(arr)); }

      window.renderMyTemplates = function() {
        const list = getMyTemplates();
        document.getElementById('myTemplateCount').textContent = list.length + '个';
        const container = document.getElementById('myTemplateList');
        if (!list.length) {
          container.innerHTML = '<div style="text-align:center;color:#ccc;padding:20px;">暂无模板</div>';
          return;
        }
        container.innerHTML = list.map(t => `
          <div class="template-card" style="display:flex; justify-content:space-between; align-items:center;">
            <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${escapeHtml(t.name)}">📌 ${escapeHtml(t.name)}</span>
            <div>
              <button class="tool-btn" style="width:22px;height:22px;" onclick="insertMyTemplate('${t.id}')">＋</button>
              <button class="tool-btn" style="width:22px;height:22px; color:#e64340;" onclick="deleteMyTemplate('${t.id}')">×</button>
            </div>
          </div>
        `).join('');
      };

      window.insertMyTemplate = function(id) {
        const tpl = getMyTemplates().find(t => t.id === id);
        if (tpl && tpl.html) { insertHtmlAtEnd(tpl.html); showToast('✅ 已插入'); }
      };
      window.deleteMyTemplate = function(id) {
        saveMyTemplates(getMyTemplates().filter(t => t.id !== id));
        renderMyTemplates();
      };
      window.clearAllMyTemplates = function() {
        if (confirm('清空所有自定义模板？')) { saveMyTemplates([]); renderMyTemplates(); }
      };

      window.fetchTemplate = async function() {
        const input = document.getElementById('templateUrlInput').value.trim();
        if (!input) return showToast('请输入ID或URL');
        let url = input;
        if (/^\d+$/.test(input)) url = `https://www.135editor.com/editor_styles/${input}.html`;
        showToast('正在获取...');
        try {
          const resp = await fetch(url, { mode: 'cors' });
          const html = await resp.text();
          if (html && html.length > 200) {
            const templates = getMyTemplates();
            templates.push({ id: Date.now().toString(36), name: '模板' + (templates.length+1), html, sourceUrl: url });
            saveMyTemplates(templates);
            renderMyTemplates();
            showToast('✅ 模板已保存');
          } else showToast('内容为空');
        } catch (e) { showToast('跨域限制，请使用粘贴源码'); setTimeout(showPasteDialog, 1000); }
      };

      window.showPasteDialog = function() {
        const html = prompt('粘贴HTML源码：');
        if (html && html.trim()) {
          const templates = getMyTemplates();
          templates.push({ id: Date.now().toString(36), name: '粘贴' + (templates.length+1), html: html.trim() });
          saveMyTemplates(templates);
          renderMyTemplates();
          showToast('✅ 已保存');
        }
      };

      // ---------- 封面 ----------
      window.setCoverImage = function(e) {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          coverDataUrl = ev.target.result;
          coverUpload.innerHTML = `<img src="${coverDataUrl}"><button class="remove-cover" onclick="event.stopPropagation();removeCover()">×</button>`;
          coverUpload.classList.add('has-image');
          saveDraft();
        };
        reader.readAsDataURL(file);
      };
      window.removeCover = function() {
        coverDataUrl = null;
        coverUpload.classList.remove('has-image');
        coverUpload.innerHTML = '<span>点击上传封面</span><span style="font-size:11px;">900×383</span><button class="remove-cover" onclick="event.stopPropagation();removeCover()">×</button>';
        saveDraft();
      };

      // ---------- 图片/链接/缩进 ----------
      window.insertImage = function(e) {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          editor.focus();
          const img = document.createElement('img');
          img.src = ev.target.result;
          img.style.maxWidth = '100%';
          document.execCommand('insertImage', false, ev.target.result);
          updateArticleInfo(); saveDraft();
        };
        reader.readAsDataURL(file);
        e.target.value = '';
      };
      window.showLinkDialog = function() {
        const url = prompt('输入链接地址 (https://...)');
        if (url) { editor.focus(); document.execCommand('createLink', false, url); }
      };
      window.indentFirstLine = function() {
        editor.focus();
        const sel = window.getSelection();
        if (sel.rangeCount && !sel.isCollapsed) {
          document.execCommand('insertHTML', false, '<span style="text-indent:2em;display:inline-block;">&#8203;</span>');
        }
      };

      // ---------- 预览/复制/导出 ----------
      window.showPreview = function() {
        const html = `<div class="modal-overlay" onclick="this.remove()"><div style="width:375px;max-height:80vh;background:#fff;border-radius:24px;overflow:hidden;"><div style="background:#f8f8f8;padding:12px;text-align:center;">📱 手机预览</div><div style="padding:16px;overflow-y:auto;max-height:calc(80vh - 44px);"><h2>${escapeHtml(titleInput.value)}</h2>${editor.innerHTML}</div></div></div>`;
        document.getElementById('modalContainer').innerHTML = html;
      };
      window.copyToWechat = function() {
        if (!editor.innerHTML || editor.innerHTML === '<br>') return showToast('无内容');
        const blob = new Blob([editor.innerHTML], {type:'text/html'});
        navigator.clipboard.write([new ClipboardItem({'text/html':blob,'text/plain':new Blob([editor.innerText],{type:'text/plain'})})])
          .then(()=>showToast('✅ 已复制，可粘贴到公众号'))
          .catch(()=>showToast('复制失败，请手动复制'));
      };
      window.exportHTML = function() {
        const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${escapeHtml(titleInput.value)}</title><style>body{max-width:680px;margin:0 auto;padding:20px;font-size:16px;line-height:1.8}img{max-width:100%}</style></head><body><h1>${escapeHtml(titleInput.value)}</h1>${editor.innerHTML}</body></html>`;
        const blob = new Blob([html],{type:'text/html'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = '文章.html'; a.click();
      };
      window.clearAll = function() {
        if (confirm('清空所有内容？')) {
          editor.innerHTML = ''; titleInput.value = ''; authorInput.value = ''; summaryInput.value = '';
          removeCover(); updateArticleInfo(); localStorage.removeItem('wechat_editor_draft');
        }
      };

      // ---------- 统计 ----------
      function updateArticleInfo() {
        const text = editor.innerText || '';
        document.getElementById('wordCount').textContent = text.length;
        document.getElementById('paraCount').textContent = editor.querySelectorAll('p,div,h1,h2,h3,blockquote,li').length || 1;
        document.getElementById('imgCount').textContent = editor.querySelectorAll('img').length;
        document.getElementById('readTime').textContent = Math.max(1, Math.ceil(text.length / 350));
        document.getElementById('charCount').textContent = summaryInput.value.length;
      }
      window.updateCharCount = function() { document.getElementById('charCount').textContent = summaryInput.value.length; };

      // ---------- 存储 ----------
      function saveDraft() {
        localStorage.setItem('wechat_editor_draft', JSON.stringify({
          title: titleInput.value, author: authorInput.value, content: editor.innerHTML, summary: summaryInput.value, coverImage: coverDataUrl
        }));
        document.getElementById('saveStatus').textContent = '已保存 ' + new Date().toLocaleTimeString();
        setTimeout(() => document.getElementById('saveStatus').textContent = '', 2000);
      }
      window.saveDraft = saveDraft;

      function loadDraft() {
        const d = JSON.parse(localStorage.getItem('wechat_editor_draft') || '{}');
        if (d.title) titleInput.value = d.title;
        if (d.author) authorInput.value = d.author;
        if (d.content) editor.innerHTML = d.content;
        if (d.summary) summaryInput.value = d.summary;
        if (d.coverImage) {
          coverDataUrl = d.coverImage;
          coverUpload.innerHTML = `<img src="${d.coverImage}"><button class="remove-cover" onclick="event.stopPropagation();removeCover()">×</button>`;
          coverUpload.classList.add('has-image');
        }
        updateArticleInfo();
      }

      function showToast(msg) {
        const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
        document.body.appendChild(t);
        setTimeout(() => { t.style.opacity='0'; setTimeout(() => t.remove(), 300); }, 2000);
      }
      window.showToast = showToast;

      function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
      window.autoResize = function(el) { el.style.height='auto'; el.style.height=el.scrollHeight+'px'; };

      // 快捷键
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey||e.metaKey) && e.key === 's') { e.preventDefault(); saveDraft(); showToast('💾 已保存'); }
      });

      // 初始化
      loadDraft();
      setInterval(() => { if (editor.innerHTML) saveDraft(); updateArticleInfo(); }, 30000);
    })();
  </script>
</body>
</html>
