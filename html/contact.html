<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>联系作者 · 云雪星球</title>
    <link rel="stylesheet" href="../css/common.css">
    <style>
        /* 并列卡片容器 */
        .contact-cards {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .contact-card {
            flex: 1;
            min-width: 220px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 1.5rem 1.2rem;
            text-align: center;
            transition: background 0.2s;
        }

        .contact-card:hover {
            background: rgba(255,255,255,0.08);
        }

        .card-icon {
            font-size: 2rem;
            margin-bottom: 0.6rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 500;
            color: #fff;
            margin-bottom: 0.3rem;
        }

        .card-desc {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 1rem;
        }

        .wechat-id, .email-id {
            font-size: 1.3rem;
            font-weight: 600;
            color: #fddb92;
            font-family: monospace;
            margin-bottom: 0.8rem;
            word-break: break-all;
        }

        .email-id {
            font-size: 1rem;
            color: #ddd;
        }

        .copy-btn {
            padding: 0.5rem 1.5rem;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: #ddd;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
            margin: 0.2rem;
        }

        .copy-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        .divider {
            width: 60%;
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 0.8rem auto;
        }

        .qr-image {
            width: 100%;
            max-width: 180px;
            border-radius: 12px;
            margin: 0.5rem auto;
            display: block;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .qr-hint {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.35);
            margin-top: 0.4rem;
        }

        /* 响应式 */
        @media (max-width: 700px) {
            .contact-cards {
                flex-direction: column;
            }
        }
    </style>
</head>
<body data-page="contact">

    <canvas id="particleCanvas"></canvas>

    <div class="layout">
        <nav class="sidebar" id="sidebar"></nav>

        <main class="main-content">
            <h1 class="page-title">💬 联系作者</h1>
            <p class="page-subtitle">加微信、关注白羊信、请我吃草，都在这里</p>

            <div class="contact-cards">
                <!-- 微信 + 邮箱联系 -->
                <div class="contact-card">
                    <div class="card-icon">🐑</div>
                    <div class="card-title">微信联系</div>
                    <p class="card-desc">加微信请备注「云雪星球」</p>
                    <div class="wechat-id">iPYJ1202</div>
                    <button class="copy-btn" id="copyWechatBtn">📋 复制微信号</button>
                    <p class="qr-hint" id="copyWechatStatus" style="margin-top:0.3rem;"></p>

                    <div class="divider"></div>

                    <p class="card-desc" style="margin-bottom:0.3rem;">或发送邮件</p>
                    <div class="email-id">980766365@qq.com</div>
                    <button class="copy-btn" id="copyEmailBtn">📋 复制邮箱</button>
                    <p class="qr-hint" id="copyEmailStatus" style="margin-top:0.3rem;"></p>
                </div>

                <!-- 白羊信（公众号） -->
                <div class="contact-card">
                    <div class="card-icon">📧</div>
                    <div class="card-title">白羊信</div>
                    <p class="card-desc">关注公众号，获取最新资讯</p>
                    <img class="qr-image" src="../image/gzh_qr.png" alt="公众号二维码">
                    <p class="qr-hint">📮 云雪星球 · 官方号</p>
                </div>

                <!-- 请我吃草 -->
                <div class="contact-card">
                    <div class="card-icon">🌿</div>
                    <div class="card-title">请我吃草</div>
                    <p class="card-desc">随缘打赏，白羊感谢</p>
                    <img class="qr-image" src="../image/wechat_pay_qr.png" alt="收款二维码">
                    <p class="qr-hint">💰 扫码支持一下～</p>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/particles.js"></script>
    <script src="../js/menu.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        // 复制微信号
        document.getElementById('copyWechatBtn').addEventListener('click', () => {
            copyToClipboard('iPYJ1202', () => {
                const status = document.getElementById('copyWechatStatus');
                status.textContent = '✅ 已复制';
                setTimeout(() => { status.textContent = ''; }, 2000);
            });
        });

        // 复制邮箱
        document.getElementById('copyEmailBtn').addEventListener('click', () => {
            copyToClipboard('980766365@qq.com', () => {
                const status = document.getElementById('copyEmailStatus');
                status.textContent = '✅ 已复制';
                setTimeout(() => { status.textContent = ''; }, 2000);
            });
        });
    </script>
</body>
</html>
