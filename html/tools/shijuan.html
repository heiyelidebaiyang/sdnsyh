<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>试卷背景净化与扶正工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
        }
        .checkerboard {
            background-image:
                linear-gradient(45deg, #e5e7eb 25%, transparent 25%),
                linear-gradient(-45deg, #e5e7eb 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #e5e7eb 75%),
                linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            background-color: #f9fafb;
        }
        .corner-handle {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #ef4444;
            border: 2px solid white;
            border-radius: 50%;
            cursor: move;
            transform: translate(-50%, -50%);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            z-index: 10;
        }
        .corner-handle:hover { background: #dc2626; transform: translate(-50%, -50%) scale(1.2); }
        .thumbnail-item {
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }
        .thumbnail-item.active { border-color: #3b82f6; }
        .thumbnail-item:hover { border-color: #93c5fd; }
        .tool-btn.active {
            background-color: #3b82f6;
            color: white;
        }
        input[type="range"] { accent-color: #3b82f6; }
        .canvas-wrapper {
            position: relative;
            display: inline-block;
        }
        .edit-overlay {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: #f1f5f9; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .split-overlay {
            position: absolute;
            top: 0; left: 0;
            z-index: 20;
            pointer-events: none;
        }
        .split-overlay.active {
            pointer-events: auto;
            cursor: crosshair;
        }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col">

<!-- 顶部标题栏 -->
<header class="bg-white shadow-sm px-4 py-2 flex items-center justify-between shrink-0 z-20">
    <div class="flex items-center gap-3">
        <h1 class="text-lg font-bold text-slate-800">📄 试卷背景净化工具 --云雪星球</h1>
        <span class="text-xs text-slate-500 bg-slate-100 px-2 py-0.5 rounded">本地处理 · 无需上传</span>
    </div>
</header>

<!-- 主体区域 -->
<div class="flex-1 flex overflow-hidden">

    <!-- 左侧参数面板 -->
    <aside class="w-64 bg-white shadow-sm p-3 flex flex-col gap-3 overflow-y-auto scrollbar-thin shrink-0">
        <div class="space-y-2">
            <h3 class="text-sm font-semibold text-slate-700">文件导入</h3>
            <div id="dropZone" class="border-2 border-dashed border-slate-300 rounded-lg p-4 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition">
                <p class="text-xs text-slate-500">拖拽图片/PDF到此处<br>或点击选择文件</p>
                <p class="text-xs text-slate-400 mt-1">支持 JPG/PNG/WEBP/BMP/PDF</p>
                <input type="file" id="fileInput" accept="image/*,.pdf" multiple class="hidden">
            </div>
        </div>

        <!-- 纸张尺寸 -->
        <div class="space-y-2">
            <h3 class="text-sm font-semibold text-slate-700">纸张尺寸</h3>
            <div class="grid grid-cols-3 gap-2">
                <button class="size-btn px-2 py-1.5 text-xs border rounded hover:bg-slate-50 active bg-blue-500 text-white border-blue-500" data-size="A4">A4</button>
                <button class="size-btn px-2 py-1.5 text-xs border rounded hover:bg-slate-50" data-size="A3">A3</button>
                <button id="btnCustomSize" class="size-btn px-2 py-1.5 text-xs border rounded hover:bg-slate-50" data-size="自定义">自定义</button>
            </div>
            <div class="grid grid-cols-2 gap-2 text-xs">
                <div>
                    <label class="text-slate-500">短边(mm)</label>
                    <input type="number" id="paperShort" value="210" class="w-full border rounded px-2 py-1 mt-0.5">
                </div>
                <div>
                    <label class="text-slate-500">长边(mm)</label>
                    <input type="number" id="paperLong" value="297" class="w-full border rounded px-2 py-1 mt-0.5">
                </div>
            </div>
            <p id="paperSizeHint" class="text-xs text-slate-400">当前：A4 (210×297mm)</p>
        </div>

        <!-- 净化参数 -->
        <div class="space-y-2">
            <h3 class="text-sm font-semibold text-slate-700 flex justify-between items-center">
                净化参数
                <button id="btnResetParams" class="text-xs text-blue-500 hover:text-blue-700 font-normal">↺ 恢复默认</button>
            </h3>
            <div class="space-y-1">
                <div class="flex justify-between text-xs">
                    <span class="text-slate-600">去灰底强度</span>
                    <span id="valDenoise" class="text-slate-400">110</span>
                </div>
                <input type="range" id="sliderDenoise" min="100" max="250" value="110" class="w-full">
            </div>
            <div class="space-y-1">
                <div class="flex justify-between text-xs">
                    <span class="text-slate-600">亮度阈值</span>
                    <span id="valThreshold" class="text-slate-400">150</span>
                </div>
                <input type="range" id="sliderThreshold" min="120" max="255" value="150" class="w-full">
            </div>
            <div class="space-y-1">
                <div class="flex justify-between text-xs">
                    <span class="text-slate-600">透字压制</span>
                    <span id="valBleed" class="text-slate-400">10</span>
                </div>
                <input type="range" id="sliderBleed" min="0" max="100" value="10" class="w-full">
            </div>
            <div class="space-y-1">
                <div class="flex justify-between text-xs">
                    <span class="text-slate-600">黑点去除</span>
                    <span id="valDespeckle" class="text-slate-400">2</span>
                </div>
                <input type="range" id="sliderDespeckle" min="0" max="10" value="2" class="w-full">
            </div>
        </div>

        <!-- 净化操作 -->
        <div class="space-y-2">
            <button id="btnPurifyCurrent" class="w-full py-2 bg-blue-500 text-white text-sm rounded hover:bg-blue-600 transition font-medium">
                ✨ 净化当前页
            </button>
            <button id="btnPurifyAll" class="w-full py-2 bg-indigo-500 text-white text-sm rounded hover:bg-indigo-600 transition">
                ⚡ 批量净化全部
            </button>
            <button id="btnResetPage" class="w-full py-1.5 border text-sm rounded hover:bg-slate-50 transition">
                🔄 恢复当前页
            </button>
        </div>

        <!-- 局部修正 -->
        <div class="space-y-2">
            <h3 class="text-sm font-semibold text-slate-700">局部修正</h3>
            <div class="grid grid-cols-2 gap-2">
                <button id="btnProtect" class="tool-btn px-2 py-1.5 text-xs border rounded hover:bg-slate-50">
                    🛡️ 保护区域
                </button>
                <button id="btnErase" class="tool-btn px-2 py-1.5 text-xs border rounded hover:bg-slate-50">
                    🧹 手动擦除
                </button>
            </div>
            <div class="space-y-1">
                <div class="flex justify-between text-xs">
                    <span class="text-slate-600">画笔大小</span>
                    <span id="valBrush" class="text-slate-400">20px</span>
                </div>
                <input type="range" id="sliderBrush" min="5" max="80" value="20" class="w-full">
            </div>
            <div class="grid grid-cols-2 gap-2">
                <button id="btnUndoEdit" class="px-2 py-1.5 text-xs border rounded hover:bg-slate-50">↶ 撤销一步</button>
                <button id="btnClearEdits" class="px-2 py-1.5 text-xs border rounded hover:bg-slate-50">清除全部</button>
            </div>
            <button id="btnFinishEdit" class="w-full py-1.5 bg-orange-500 text-white text-xs rounded hover:bg-orange-600 transition font-medium">
                ✓ 完成框选
            </button>
            <p class="text-xs text-slate-500">绿/红标记仅预览，不影响最终下载</p>
        </div>
    </aside>

    <!-- 中间预览区 -->
    <main class="flex-1 flex flex-col overflow-hidden">

        <!-- 右侧工具栏 -->
        <div id="toolbarRow" class="bg-white border-b px-3 py-2 flex items-center gap-2 flex-wrap shrink-0">
            <button id="btnImport" class="px-3 py-1 bg-blue-500 text-white text-xs rounded hover:bg-blue-600 transition">📂 导入文件</button>
            <div class="w-px h-5 bg-slate-300 mx-1"></div>
            <button id="btnUndo" class="px-3 py-1 text-xs border rounded hover:bg-slate-50">↶ 撤销 (Ctrl+Z)</button>
            <button id="btnClearAll" class="px-3 py-1 text-xs border rounded hover:bg-slate-50">🗑️ 全部清除</button>
            <button id="btnSplitA3" class="px-3 py-1 text-xs border rounded hover:bg-slate-50" title="在原始图上画线决定拆分方向">✂️ A3拆分为A4</button>
            <div class="w-px h-5 bg-slate-300 mx-1"></div>
            <div class="flex items-center gap-1 text-xs">
                <span class="text-slate-600">视图缩放</span>
                <span id="valZoom" class="text-slate-400 w-10 text-right">100%</span>
                <input type="range" id="sliderZoom" min="15" max="200" value="100" class="w-24">
            </div>
            <span class="text-xs text-slate-400 ml-auto" id="toolbarInfo">无页面</span>
            <div class="flex items-center gap-1 ml-2">
                <button id="btnDownloadImg" class="px-3 py-1 bg-green-600 text-white text-xs rounded hover:bg-green-700 transition">💾 下载图片</button>
                <button id="btnPrintPDF" class="px-3 py-1 bg-slate-800 text-white text-xs rounded hover:bg-slate-900 transition">🖨️ 导出PDF/打印</button>
            </div>
        </div>

        <!-- 双预览区 -->
        <div class="flex-1 flex gap-3 p-3 overflow-auto justify-center items-start">
            <div class="flex flex-col items-center gap-2">
                <div class="text-xs text-slate-500 font-medium">原始照片</div>
                <div id="origContainer" class="checkerboard shadow-lg rounded overflow-hidden flex items-center justify-center" style="width: 420px; height: 594px;">
                    <div id="origWrapper" class="canvas-wrapper relative">
                        <canvas id="origCanvas"></canvas>
                        <div id="cornerHandles" class="absolute inset-0 pointer-events-none"></div>
                        <canvas id="splitCanvas" class="split-overlay" style="position:absolute;top:0;left:0;"></canvas>
                    </div>
                </div>
                <div class="flex items-center gap-1 flex-wrap justify-center">
                    <button id="btnResetCorners" class="px-2 py-1 text-xs border rounded hover:bg-slate-50">整张图片</button>
                    <button id="btnAutoDetect" class="px-2 py-1 text-xs border rounded hover:bg-slate-50">🔍 自动识别边缘</button>
                    <div class="w-px h-5 bg-slate-300 mx-1"></div>
                    <button id="btnRotateLeft" class="px-2 py-1 text-xs border rounded hover:bg-slate-50">↺ 左旋90°</button>
                    <button id="btnRotateRight" class="px-2 py-1 text-xs border rounded hover:bg-slate-50">↻ 右旋90°</button>
                </div>
                <div id="origStatus" class="text-xs text-slate-400">请导入图片</div>
            </div>
            <div class="flex flex-col items-center gap-2">
                <div class="text-xs text-slate-500 font-medium flex items-center gap-2">
                    整理后的打印效果
                    <span id="purifyBadge" class="hidden text-green-600 bg-green-50 px-1.5 py-0.5 rounded text-xs">✅ 已净化</span>
                </div>
                <div id="resultContainer" class="bg-white shadow-lg rounded overflow-hidden flex items-center justify-center border border-slate-200" style="width: 420px; height: 594px;">
                    <div id="resultWrapper" class="canvas-wrapper relative">
                        <canvas id="resultCanvas"></canvas>
                        <canvas id="editOverlay" class="edit-overlay"></canvas>
                    </div>
                </div>
                <div id="resultStatus" class="text-xs text-slate-400">-</div>
            </div>
        </div>

        <!-- 底部缩略图栏 -->
        <div class="bg-white border-t shrink-0 px-3 py-2">
            <div class="flex items-center gap-2 mb-1">
                <span class="text-xs font-medium text-slate-600">本批原纸</span>
                <span id="pageCount" class="text-xs text-slate-400">共 0 页</span>
            </div>
            <div id="thumbnailBar" class="flex gap-2 overflow-x-auto scrollbar-thin pb-1 min-h-[70px]">
                <div class="text-xs text-slate-400 flex items-center">暂无文件，请导入图片或PDF</div>
            </div>
        </div>
    </main>
</div>

<script>
// ==================== 全局状态 ====================
const state = {
    pages: [],
    currentIndex: -1,
    paperSize: { short: 210, long: 297, name: 'A4' },
    zoom: 100,
    cornerMode: true,
    editMode: null,
    brushSize: 20,
    history: [],
    historyIndex: -1,
    editHistory: [],
    splitMode: false,
    splitStart: null,
    splitEnd: null,
};

const DEFAULT_PARAMS = { denoise: 110, threshold: 150, bleed: 10, despeckle: 2 };
const MAX_PIXELS = 20000000; // 2000万像素警告阈值

const origCanvas = document.getElementById('origCanvas');
const origCtx = origCanvas.getContext('2d');
const resultCanvas = document.getElementById('resultCanvas');
const resultCtx = resultCanvas.getContext('2d');
const editOverlay = document.getElementById('editOverlay');
const editCtx = editOverlay.getContext('2d');
const cornerHandles = document.getElementById('cornerHandles');
const thumbnailBar = document.getElementById('thumbnailBar');
const splitCanvas = document.getElementById('splitCanvas');
const splitCtx = splitCanvas.getContext('2d');
let currentOrigScale = 1;

function init() {
    setupEventListeners();
    drawPlaceholder(origCanvas, '请导入试卷图片');
    drawPlaceholder(resultCanvas, '净化结果显示区');
    updateThumbnails();
    updateToolbarInfo();
    updatePaperSizeHint();
}

function drawPlaceholder(canvas, text) {
    canvas.width = 300;
    canvas.height = 400;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#f8fafc';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#94a3b8';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(text, canvas.width / 2, canvas.height / 2);
}

function setupEventListeners() {
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const btnImport = document.getElementById('btnImport');

    dropZone.addEventListener('click', () => fileInput.click());
    btnImport.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => handleFiles(e.target.files));

    ['origContainer', 'resultContainer'].forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('ring-2', 'ring-blue-400'); });
        el.addEventListener('dragleave', () => el.classList.remove('ring-2', 'ring-blue-400'));
        el.addEventListener('drop', e => {
            e.preventDefault();
            el.classList.remove('ring-2', 'ring-blue-400');
            if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
        });
    });

    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', e => e.preventDefault());

    document.addEventListener('paste', e => {
        const items = e.clipboardData.items;
        for (let item of items) {
            if (item.type.startsWith('image/')) {
                const file = item.getAsFile();
                handleFiles([file]);
            }
        }
    });

    // 纸张尺寸
    document.querySelectorAll('.size-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('bg-blue-500', 'text-white', 'border-blue-500'));
            btn.classList.add('bg-blue-500', 'text-white', 'border-blue-500');
            const size = btn.dataset.size;
            if (size === 'A4') {
                state.paperSize = { short: 210, long: 297, name: 'A4' };
                document.getElementById('paperShort').value = 210;
                document.getElementById('paperLong').value = 297;
            } else if (size === 'A3') {
                state.paperSize = { short: 297, long: 420, name: 'A3' };
                document.getElementById('paperShort').value = 297;
                document.getElementById('paperLong').value = 420;
            } else {
                state.paperSize.name = '自定义';
            }
            updatePaperSizeHint();
        });
    });

    document.getElementById('paperShort').addEventListener('input', updateCustomPaperSize);
    document.getElementById('paperLong').addEventListener('input', updateCustomPaperSize);

    document.getElementById('btnResetParams').addEventListener('click', resetParamsToDefault);

    document.getElementById('btnResetCorners').addEventListener('click', resetCorners);
    document.getElementById('btnAutoDetect').addEventListener('click', autoDetectEdges);

    document.getElementById('btnRotateLeft').addEventListener('click', () => rotatePage(-90));
    document.getElementById('btnRotateRight').addEventListener('click', () => rotatePage(90));

    document.getElementById('btnUndo').addEventListener('click', undo);
    document.getElementById('btnClearAll').addEventListener('click', clearAll);
    document.getElementById('btnSplitA3').addEventListener('click', enterSplitMode);

    splitCanvas.addEventListener('mousedown', onSplitMouseDown);
    splitCanvas.addEventListener('mousemove', onSplitMouseMove);
    splitCanvas.addEventListener('mouseup', onSplitMouseUp);

    const sliders = [
        ['sliderDenoise', 'valDenoise'],
        ['sliderThreshold', 'valThreshold'],
        ['sliderBleed', 'valBleed'],
        ['sliderDespeckle', 'valDespeckle'],
        ['sliderBrush', 'valBrush', 'px'],
    ];
    sliders.forEach(([sliderId, valId, suffix = '']) => {
        const slider = document.getElementById(sliderId);
        const val = document.getElementById(valId);
        slider.addEventListener('input', () => {
            val.textContent = slider.value + suffix;
            if (sliderId === 'sliderBrush') state.brushSize = parseInt(slider.value);
        });
    });

    document.getElementById('sliderZoom').addEventListener('input', e => {
        state.zoom = parseInt(e.target.value);
        document.getElementById('valZoom').textContent = state.zoom + '%';
        applyZoom();
    });

    document.getElementById('btnPurifyCurrent').addEventListener('click', purifyCurrent);
    document.getElementById('btnPurifyAll').addEventListener('click', purifyAll);
    document.getElementById('btnResetPage').addEventListener('click', resetCurrentPage);

    document.getElementById('btnProtect').addEventListener('click', () => setEditMode('protect'));
    document.getElementById('btnErase').addEventListener('click', () => setEditMode('erase'));
    document.getElementById('btnUndoEdit').addEventListener('click', undoEdit);
    document.getElementById('btnClearEdits').addEventListener('click', clearAllEdits);
    document.getElementById('btnFinishEdit').addEventListener('click', finishEdit);

    resultCanvas.addEventListener('mousedown', startEdit);
    resultCanvas.addEventListener('mousemove', drawEdit);
    resultCanvas.addEventListener('mouseup', endEdit);
    resultCanvas.addEventListener('mouseleave', endEdit);

    document.getElementById('btnDownloadImg').addEventListener('click', downloadImage);
    document.getElementById('btnPrintPDF').addEventListener('click', printPDF);

    document.addEventListener('keydown', e => {
        if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
        if (state.currentIndex >= 0) {
            if (e.key === 'ArrowLeft') { e.preventDefault(); switchPage(state.currentIndex - 1); }
            if (e.key === 'ArrowRight') { e.preventDefault(); switchPage(state.currentIndex + 1); }
        }
    });
}

// ==================== 辅助：获取页面原始像素数据（动态生成，不存储） ====================
function getOriginalImageData(page) {
    const canvas = document.createElement('canvas');
    canvas.width = page.width;
    canvas.height = page.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(page.originalImage, 0, 0);
    return ctx.getImageData(0, 0, page.width, page.height);
}

// ==================== 参数重置 ====================
function resetParamsToDefault() {
    document.getElementById('sliderDenoise').value = DEFAULT_PARAMS.denoise;
    document.getElementById('valDenoise').textContent = DEFAULT_PARAMS.denoise;
    document.getElementById('sliderThreshold').value = DEFAULT_PARAMS.threshold;
    document.getElementById('valThreshold').textContent = DEFAULT_PARAMS.threshold;
    document.getElementById('sliderBleed').value = DEFAULT_PARAMS.bleed;
    document.getElementById('valBleed').textContent = DEFAULT_PARAMS.bleed;
    document.getElementById('sliderDespeckle').value = DEFAULT_PARAMS.despeckle;
    document.getElementById('valDespeckle').textContent = DEFAULT_PARAMS.despeckle;
}

function updateCustomPaperSize() {
    const short = parseFloat(document.getElementById('paperShort').value) || 210;
    const long = parseFloat(document.getElementById('paperLong').value) || 297;
    state.paperSize.short = short;
    state.paperSize.long = long;
    state.paperSize.name = '自定义';
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('bg-blue-500', 'text-white', 'border-blue-500'));
    document.getElementById('btnCustomSize')?.classList.add('bg-blue-500', 'text-white', 'border-blue-500');
    updatePaperSizeHint();
}

function updatePaperSizeHint() {
    const hint = document.getElementById('paperSizeHint');
    if (hint) hint.textContent = `当前：${state.paperSize.name} (${state.paperSize.short}×${state.paperSize.long}mm)`;
}

// ==================== 文件处理 ====================
async function handleFiles(files) {
    for (let file of files) {
        if (file.type === 'application/pdf') {
            await loadPDF(file);
        } else if (file.type.startsWith('image/')) {
            await loadImageFile(file);
        }
    }
    if (state.pages.length > 0 && state.currentIndex < 0) switchPage(0);
    updateThumbnails();
    updateToolbarInfo();
}

function loadImageFile(file) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => { addPage(img, file.name); resolve(); };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

async function loadPDF(file) {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
    for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const scale = 2; // 降低分辨率以节省内存
        const viewport = page.getViewport({ scale });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        const ctx = canvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport }).promise;
        const img = new Image();
        img.src = canvas.toDataURL('image/png');
        await new Promise(r => img.onload = r);
        addPage(img, `${file.name} 第${i}页`);
    }
}

function addPage(img, name) {
    const w = img.width, h = img.height;
    if (w * h > MAX_PIXELS) {
        alert(`图片分辨率较大（${w}×${h}），可能导致性能问题，建议压缩后再导入。`);
    }
    const page = {
        id: Date.now() + Math.random(),
        name: name || '未命名',
        originalImage: img,
        width: w,
        height: h,
        corners: [
            { x: 0, y: 0 },
            { x: w, y: 0 },
            { x: w, y: h },
            { x: 0, y: h }
        ],
        cornersModified: false,
        purified: false,
        purifiedData: null,
        purifiedWidth: 0,
        purifiedHeight: 0,
        editLayers: [],
        rotation: 0
    };
    state.pages.push(page);
    saveHistory();
}

// ==================== 缩略图与页码 ====================
function updateThumbnails() {
    thumbnailBar.innerHTML = '';
    if (state.pages.length === 0) {
        thumbnailBar.innerHTML = '<div class="text-xs text-slate-400 flex items-center">暂无文件，请导入图片或PDF</div>';
        document.getElementById('pageCount').textContent = '共 0 页';
        return;
    }
    document.getElementById('pageCount').textContent = `共 ${state.pages.length} 页`;
    state.pages.forEach((page, idx) => {
        const div = document.createElement('div');
        div.className = `thumbnail-item shrink-0 rounded overflow-hidden bg-slate-100 ${idx === state.currentIndex ? 'active' : ''}`;
        div.style.width = '50px';
        div.style.height = '70px';
        const thumbCanvas = document.createElement('canvas');
        const scale = Math.min(50 / page.width, 70 / page.height);
        thumbCanvas.width = page.width * scale;
        thumbCanvas.height = page.height * scale;
        thumbCanvas.getContext('2d').drawImage(page.originalImage, 0, 0, thumbCanvas.width, thumbCanvas.height);
        div.appendChild(thumbCanvas);
        div.title = page.name;
        div.addEventListener('click', () => switchPage(idx));
        thumbnailBar.appendChild(div);
    });
}

function switchPage(index) {
    if (index < 0 || index >= state.pages.length) return;
    state.currentIndex = index;
    renderOriginal();
    renderResult();
    updateThumbnails();
    updateStatus();
    updateToolbarInfo();
    setEditMode(null);
    if (state.splitMode) exitSplitMode(false);
}

function updateToolbarInfo() {
    document.getElementById('toolbarInfo').textContent =
        state.pages.length === 0 ? '无页面' : `第 ${state.currentIndex + 1}/${state.pages.length} 页`;
}

// ==================== 原始图渲染与四角 ====================
function renderOriginal() {
    const page = currentPage();
    if (!page) {
        origCanvas.width = 0; origCanvas.height = 0;
        return;
    }
    const containerW = 420, containerH = 594;
    currentOrigScale = Math.min(containerW / page.width, containerH / page.height) * (state.zoom / 100);
    const dw = page.width * currentOrigScale;
    const dh = page.height * currentOrigScale;
    origCanvas.width = dw;
    origCanvas.height = dh;
    origCtx.drawImage(page.originalImage, 0, 0, dw, dh);
    document.getElementById('origWrapper').style.width = dw + 'px';
    document.getElementById('origWrapper').style.height = dh + 'px';
    splitCanvas.width = dw;
    splitCanvas.height = dh;
    splitCanvas.style.width = dw + 'px';
    splitCanvas.style.height = dh + 'px';
    splitCtx.clearRect(0, 0, dw, dh);
    renderCorners();
    if (state.splitMode) drawSplitLine();
}

function renderCorners() {
    const page = currentPage();
    cornerHandles.innerHTML = '';
    if (!page) return;
    const s = currentOrigScale;
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('class', 'absolute inset-0 pointer-events-none');
    svg.style.width = '100%';
    svg.style.height = '100%';
    const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    const updatePolygonPoints = () => {
        polygon.setAttribute('points', page.corners.map(c => `${c.x * s},${c.y * s}`).join(' '));
    };
    updatePolygonPoints();
    polygon.setAttribute('fill', 'rgba(239, 68, 68, 0.1)');
    polygon.setAttribute('stroke', '#ef4444');
    polygon.setAttribute('stroke-width', '2');
    polygon.setAttribute('stroke-dasharray', '5,5');
    svg.appendChild(polygon);
    cornerHandles.appendChild(svg);

    page.corners.forEach((corner, i) => {
        const handle = document.createElement('div');
        handle.className = 'corner-handle pointer-events-auto';
        handle.style.left = (corner.x * s) + 'px';
        handle.style.top = (corner.y * s) + 'px';
        handle.dataset.index = i;
        let dragging = false;
        let startX, startY, origX, origY;
        const onMove = ev => {
            if (!dragging || state.splitMode) return;
            const dx = (ev.clientX - startX) / s;
            const dy = (ev.clientY - startY) / s;
            corner.x = Math.max(0, Math.min(page.width, origX + dx));
            corner.y = Math.max(0, Math.min(page.height, origY + dy));
            handle.style.left = (corner.x * s) + 'px';
            handle.style.top = (corner.y * s) + 'px';
            page.cornersModified = true;
            updatePolygonPoints();
        };
        const onUp = () => {
            dragging = false;
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
        };
        handle.addEventListener('mousedown', e => {
            if (state.splitMode) return;
            e.stopPropagation();
            dragging = true;
            startX = e.clientX;
            startY = e.clientY;
            origX = corner.x;
            origY = corner.y;
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
        });
        cornerHandles.appendChild(handle);
    });
}

function resetCorners() {
    const page = currentPage();
    if (!page) return;
    page.corners = [
        { x: 0, y: 0 },
        { x: page.width, y: 0 },
        { x: page.width, y: page.height },
        { x: 0, y: page.height }
    ];
    page.cornersModified = false;
    renderOriginal();
}

function autoDetectEdges() {
    const page = currentPage();
    if (!page) return;
    const imageData = getOriginalImageData(page);
    const data = imageData.data;
    const w = page.width, h = page.height;
    let minX = w, minY = h, maxX = 0, maxY = 0;
    const threshold = 240, step = 5;
    for (let y = 0; y < h; y += step) {
        for (let x = 0; x < w; x += step) {
            const idx = (y * w + x) * 4;
            const gray = (data[idx] + data[idx+1] + data[idx+2]) / 3;
            if (gray < threshold) {
                if (x < minX) minX = x;
                if (x > maxX) maxX = x;
                if (y < minY) minY = y;
                if (y > maxY) maxY = y;
            }
        }
    }
    const margin = 20;
    minX = Math.max(0, minX - margin);
    minY = Math.max(0, minY - margin);
    maxX = Math.min(w, maxX + margin);
    maxY = Math.min(h, maxY + margin);
    page.corners = [
        { x: minX, y: minY },
        { x: maxX, y: minY },
        { x: maxX, y: maxY },
        { x: minX, y: maxY }
    ];
    page.cornersModified = true;
    renderOriginal();
}

// ==================== 旋转 ====================
async function rotatePage(degrees) {
    const page = currentPage();
    if (!page) return;
    saveHistory();
    const isCW = degrees > 0;
    const newCanvas = document.createElement('canvas');
    newCanvas.width = page.height;
    newCanvas.height = page.width;
    const nctx = newCanvas.getContext('2d');
    nctx.save();
    if (isCW) {
        nctx.translate(newCanvas.width, 0);
        nctx.rotate(Math.PI / 2);
    } else {
        nctx.translate(0, newCanvas.height);
        nctx.rotate(-Math.PI / 2);
    }
    nctx.drawImage(page.originalImage, 0, 0);
    nctx.restore();
    const rotatedImg = new Image();
    rotatedImg.src = newCanvas.toDataURL();
    await new Promise(resolve => { rotatedImg.onload = resolve; });
    page.originalImage = rotatedImg;
    const oldW = page.width;
    page.width = page.height;
    page.height = oldW;
    page.corners = [
        { x: 0, y: 0 },
        { x: page.width, y: 0 },
        { x: page.width, y: page.height },
        { x: 0, y: page.height }
    ];
    page.cornersModified = false;
    page.purified = false;
    page.purifiedData = null;
    page.editLayers = [];
    page.rotation = (page.rotation + degrees) % 360;
    renderOriginal();
    renderResult();
    updateThumbnails();
    updateStatus();
}

// ==================== A3拆分 ====================
function enterSplitMode() {
    const page = currentPage();
    if (!page) return alert('没有可拆分的页面');
    if (state.splitMode) { exitSplitMode(false); return; }
    state.splitMode = true;
    state.splitStart = null;
    state.splitEnd = null;
    document.getElementById('btnSplitA3').classList.add('bg-blue-500', 'text-white');
    splitCanvas.classList.add('active');
    splitCtx.clearRect(0, 0, splitCanvas.width, splitCanvas.height);
    renderOriginal();
    alert('请在原始照片上画一条线（横向分割画水平线，竖向分割画竖线）');
}

function exitSplitMode(split = false) {
    state.splitMode = false;
    state.splitStart = state.splitEnd = null;
    document.getElementById('btnSplitA3').classList.remove('bg-blue-500', 'text-white');
    splitCanvas.classList.remove('active');
    splitCtx.clearRect(0, 0, splitCanvas.width, splitCanvas.height);
    if (!split) renderOriginal();
}

function onSplitMouseDown(e) {
    if (!state.splitMode) return;
    const rect = splitCanvas.getBoundingClientRect();
    const scale = currentPage().width / splitCanvas.width;
    state.splitStart = { x: (e.clientX - rect.left) * scale, y: (e.clientY - rect.top) * scale };
    state.splitEnd = null;
    drawSplitLine();
}

function onSplitMouseMove(e) {
    if (!state.splitMode || !state.splitStart) return;
    const rect = splitCanvas.getBoundingClientRect();
    const scale = currentPage().width / splitCanvas.width;
    state.splitEnd = { x: (e.clientX - rect.left) * scale, y: (e.clientY - rect.top) * scale };
    drawSplitLine();
}

function onSplitMouseUp() {
    if (!state.splitMode || !state.splitStart || !state.splitEnd) return;
    const page = currentPage();
    const dx = state.splitEnd.x - state.splitStart.x;
    const dy = state.splitEnd.y - state.splitStart.y;
    if (Math.hypot(dx, dy) < 30) return;
    const angle = Math.abs(Math.atan2(dy, dx) * 180 / Math.PI);
    const horizontal = angle <= 45 || angle >= 135;
    if (horizontal) {
        const splitY = Math.round(state.splitStart.y + dy / 2);
        performSplit(page, false, splitY);
    } else {
        const splitX = Math.round(state.splitStart.x + dx / 2);
        performSplit(page, true, splitX);
    }
    exitSplitMode(true);
}

function drawSplitLine() {
    splitCtx.clearRect(0, 0, splitCanvas.width, splitCanvas.height);
    if (!state.splitStart || !state.splitEnd) return;
    const page = currentPage();
    const s = splitCanvas.width / page.width;
    splitCtx.beginPath();
    splitCtx.moveTo(state.splitStart.x * s, state.splitStart.y * s);
    splitCtx.lineTo(state.splitEnd.x * s, state.splitEnd.y * s);
    splitCtx.strokeStyle = '#3b82f6';
    splitCtx.lineWidth = 3;
    splitCtx.setLineDash([6, 4]);
    splitCtx.stroke();
    splitCtx.setLineDash([]);
}

async function performSplit(page, vertical, splitPos) {
    if (!confirm('确认按此方向拆分当前A3页面吗？')) return;
    saveHistory();
    const origCanvas = document.createElement('canvas');
    origCanvas.width = page.width; origCanvas.height = page.height;
    origCanvas.getContext('2d').drawImage(page.originalImage, 0, 0);
    const pagesToAdd = [];
    for (let i = 0; i < 2; i++) {
        const sx = vertical ? (i === 0 ? 0 : splitPos) : 0;
        const sy = vertical ? 0 : (i === 0 ? 0 : splitPos);
        const sw = vertical ? (i === 0 ? splitPos : page.width - splitPos) : page.width;
        const sh = vertical ? page.height : (i === 0 ? splitPos : page.height - splitPos);
        const newCanvas = document.createElement('canvas');
        newCanvas.width = sw; newCanvas.height = sh;
        newCanvas.getContext('2d').drawImage(origCanvas, sx, sy, sw, sh, 0, 0, sw, sh);
        const newImg = new Image();
        newImg.src = newCanvas.toDataURL();
        await new Promise(r => newImg.onload = r);
        pagesToAdd.push({
            id: Date.now() + Math.random(),
            name: `${page.name} 拆-${i+1}`,
            originalImage: newImg,
            width: sw, height: sh,
            corners: [{ x: 0, y: 0 }, { x: sw, y: 0 }, { x: sw, y: sh }, { x: 0, y: sh }],
            cornersModified: false,
            purified: false, purifiedData: null, purifiedWidth: 0, purifiedHeight: 0,
            editLayers: [], rotation: 0
        });
    }
    const idx = state.currentIndex;
    state.pages.splice(idx, 1, pagesToAdd[0]);
    state.pages.splice(idx + 1, 0, pagesToAdd[1]);
    state.paperSize = { short: 210, long: 297, name: 'A4' };
    document.getElementById('paperShort').value = 210;
    document.getElementById('paperLong').value = 297;
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('bg-blue-500', 'text-white', 'border-blue-500'));
    document.querySelector('.size-btn[data-size="A4"]')?.classList.add('bg-blue-500', 'text-white', 'border-blue-500');
    updatePaperSizeHint();
    state.currentIndex = idx;
    renderOriginal(); renderResult(); updateThumbnails(); updateStatus(); updateToolbarInfo();
}

// ==================== 净化处理 ====================
function purifyCurrent() {
    const page = currentPage();
    if (!page) return;
    saveHistory();
    performPurification(page);
    renderResult();
    updateStatus();
}

function purifyAll() {
    if (state.pages.length === 0) return;
    saveHistory();
    for (let page of state.pages) performPurification(page);
    renderResult();
    updateStatus();
    alert(`已完成 ${state.pages.length} 页批量净化`);
}

function performPurification(page) {
    const denoise = parseInt(document.getElementById('sliderDenoise').value);
    const threshold = parseInt(document.getElementById('sliderThreshold').value);
    const bleed = parseInt(document.getElementById('sliderBleed').value);
    const despeckle = parseInt(document.getElementById('sliderDespeckle').value);

    let sourceData, sourceW, sourceH;
    if (page.cornersModified) {
        const result = perspectiveTransform(page);
        sourceData = result.imageData;
        sourceW = result.width; sourceH = result.height;
    } else {
        const origData = getOriginalImageData(page);
        sourceData = origData;
        sourceW = page.width; sourceH = page.height;
    }

    const data = new Uint8ClampedArray(sourceData.data);
    const w = sourceW, h = sourceH;

    for (let i = 0; i < data.length; i += 4) {
        let gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
        if (bleed > 0 && gray > threshold * 0.6) {
            gray = gray + (255 - gray) * (bleed / 100) * 0.5;
        }
        if (gray >= threshold) {
            data[i] = 255; data[i+1] = 255; data[i+2] = 255;
        } else if (gray <= denoise) {
            const darkVal = Math.round(gray * 0.15);
            data[i] = darkVal; data[i+1] = darkVal; data[i+2] = darkVal;
        } else {
            const t = (gray - denoise) / (threshold - denoise);
            const val = Math.round(denoise * 0.15 + t * 255);
            data[i] = val; data[i+1] = val; data[i+2] = val;
        }
    }

    if (despeckle > 0) {
        const temp = new Uint8ClampedArray(data);
        const radius = despeckle;
        for (let y = radius; y < h - radius; y++) {
            for (let x = radius; x < w - radius; x++) {
                const idx = (y * w + x) * 4;
                if (data[idx] < 100) {
                    let whiteCount = 0, total = 0;
                    for (let dy = -radius; dy <= radius; dy++) {
                        for (let dx = -radius; dx <= radius; dx++) {
                            const nidx = ((y + dy) * w + (x + dx)) * 4;
                            if (temp[nidx] > 200) whiteCount++;
                            total++;
                        }
                    }
                    if (whiteCount / total > 0.8) data[idx] = data[idx+1] = data[idx+2] = 255;
                }
            }
        }
    }

    page.purifiedData = new ImageData(data, sourceW, sourceH);
    page.purifiedWidth = sourceW; page.purifiedHeight = sourceH;
    page.purified = true;
    page.editLayers = [];
}

function perspectiveTransform(page) {
    const corners = page.corners;
    const paperRatio = state.paperSize.long / state.paperSize.short;
    const topW = Math.hypot(corners[1].x - corners[0].x, corners[1].y - corners[0].y);
    const bottomW = Math.hypot(corners[2].x - corners[3].x, corners[2].y - corners[3].y);
    const leftH = Math.hypot(corners[3].x - corners[0].x, corners[3].y - corners[0].y);
    const rightH = Math.hypot(corners[2].x - corners[1].x, corners[2].y - corners[1].y);
    const avgW = (topW + bottomW) / 2, avgH = (leftH + rightH) / 2;
    let targetW, targetH;
    if (avgH / avgW > 1) {
        targetW = Math.round(avgW); targetH = Math.round(avgW * paperRatio);
    } else {
        targetH = Math.round(avgH); targetW = Math.round(avgH * paperRatio);
    }
    const outCanvas = document.createElement('canvas');
    outCanvas.width = targetW; outCanvas.height = targetH;
    const outCtx = outCanvas.getContext('2d');
    const outData = outCtx.createImageData(targetW, targetH);
    const dst = outData.data;
    const srcData = getOriginalImageData(page);
    const src = srcData.data;
    const srcW = page.width, srcH = page.height;

    for (let y = 0; y < targetH; y++) {
        for (let x = 0; x < targetW; x++) {
            const u = x / targetW, v = y / targetH;
            const topX = corners[0].x + (corners[1].x - corners[0].x) * u;
            const topY = corners[0].y + (corners[1].y - corners[0].y) * u;
            const bottomX = corners[3].x + (corners[2].x - corners[3].x) * u;
            const bottomY = corners[3].y + (corners[2].y - corners[3].y) * u;
            const srcX = topX + (bottomX - topX) * v;
            const srcY = topY + (bottomY - topY) * v;
            const x0 = Math.floor(srcX), y0 = Math.floor(srcY);
            const x1 = Math.min(x0 + 1, srcW - 1), y1 = Math.min(y0 + 1, srcH - 1);
            const fx = srcX - x0, fy = srcY - y0;
            if (x0 >= 0 && x1 < srcW && y0 >= 0 && y1 < srcH) {
                const idx00 = (y0 * srcW + x0) * 4;
                const idx10 = (y0 * srcW + x1) * 4;
                const idx01 = (y1 * srcW + x0) * 4;
                const idx11 = (y1 * srcW + x1) * 4;
                const didx = (y * targetW + x) * 4;
                for (let c = 0; c < 3; c++) {
                    dst[didx + c] = src[idx00 + c] * (1-fx)*(1-fy) + src[idx10 + c] * fx*(1-fy) + src[idx01 + c] * (1-fx)*fy + src[idx11 + c] * fx*fy;
                }
                dst[didx + 3] = 255;
            }
        }
    }
    return { imageData: outData, width: targetW, height: targetH };
}

// ==================== 结果渲染与编辑 ====================
function renderResult() {
    const page = currentPage();
    if (!page) {
        drawPlaceholder(resultCanvas, '净化结果显示区');
        editOverlay.width = 0; editOverlay.height = 0;
        return;
    }
    if (!page.purified || !page.purifiedData) {
        drawPlaceholder(resultCanvas, '点击"净化当前页"查看效果');
        editOverlay.width = 0; editOverlay.height = 0;
        document.getElementById('purifyBadge').classList.add('hidden');
        return;
    }
    const containerW = 420, containerH = 594;
    const scale = Math.min(containerW / page.purifiedWidth, containerH / page.purifiedHeight) * (state.zoom / 100);
    const dw = page.purifiedWidth * scale;
    const dh = page.purifiedHeight * scale;
    resultCanvas.width = dw;
    resultCanvas.height = dh;
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = page.purifiedWidth;
    tempCanvas.height = page.purifiedHeight;
    tempCanvas.getContext('2d').putImageData(page.purifiedData, 0, 0);
    applyEditLayers(tempCanvas, page);
    resultCtx.drawImage(tempCanvas, 0, 0, dw, dh);
    editOverlay.width = dw;
    editOverlay.height = dh;
    editOverlay.style.width = dw + 'px';
    editOverlay.style.height = dh + 'px';
    document.getElementById('resultWrapper').style.width = dw + 'px';
    document.getElementById('resultWrapper').style.height = dh + 'px';
    document.getElementById('purifyBadge').classList.remove('hidden');
    redrawEditOverlay();
}

function applyEditLayers(canvas, page) {
    const ctx = canvas.getContext('2d');
    page.editLayers.forEach(layer => {
        if (layer.type === 'protect' && layer.sourceData) {
            ctx.putImageData(layer.sourceData, layer.x, layer.y);
        } else if (layer.type === 'erase') {
            ctx.beginPath();
            layer.points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
            ctx.lineWidth = layer.size;
            ctx.lineCap = ctx.lineJoin = 'round';
            ctx.strokeStyle = 'white';
            ctx.stroke();
        }
    });
}

let isEditing = false;
let currentStroke = null;

function setEditMode(mode) {
    state.editMode = mode;
    document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
    if (mode === 'protect') {
        document.getElementById('btnProtect').classList.add('active');
        resultCanvas.style.cursor = 'crosshair';
    } else if (mode === 'erase') {
        document.getElementById('btnErase').classList.add('active');
        resultCanvas.style.cursor = 'crosshair';
    } else {
        resultCanvas.style.cursor = 'default';
    }
    redrawEditOverlay();
}

function startEdit(e) {
    if (!state.editMode) return;
    const page = currentPage();
    if (!page || !page.purified) return;
    const rect = resultCanvas.getBoundingClientRect();
    const scale = page.purifiedWidth / resultCanvas.width;
    const x = (e.clientX - rect.left) * scale;
    const y = (e.clientY - rect.top) * scale;
    isEditing = true;
    if (state.editMode === 'erase') {
        currentStroke = { type: 'erase', size: state.brushSize * scale, points: [{ x, y }] };
    } else {
        currentStroke = { type: 'protect', startX: x, startY: y, endX: x, endY: y };
    }
    redrawEditOverlay();
}

function drawEdit(e) {
    if (!isEditing || !currentStroke) return;
    const page = currentPage();
    const rect = resultCanvas.getBoundingClientRect();
    const scale = page.purifiedWidth / resultCanvas.width;
    const x = (e.clientX - rect.left) * scale;
    const y = (e.clientY - rect.top) * scale;
    if (state.editMode === 'erase') {
        currentStroke.points.push({ x, y });
    } else {
        currentStroke.endX = x;
        currentStroke.endY = y;
    }
    redrawEditOverlay();
}

function endEdit() {
    if (!isEditing || !currentStroke) return;
    isEditing = false;
    const page = currentPage();
    if (state.editMode === 'protect') {
        const x1 = Math.min(currentStroke.startX, currentStroke.endX);
        const y1 = Math.min(currentStroke.startY, currentStroke.endY);
        const x2 = Math.max(currentStroke.startX, currentStroke.endX);
        const y2 = Math.max(currentStroke.startY, currentStroke.endY);
        const w = x2 - x1, h = y2 - y1;
        if (w > 5 && h > 5 && page.purifiedData) {
            page.editLayers.push({
                type: 'protect',
                x: Math.floor(x1), y: Math.floor(y1),
                width: Math.floor(w), height: Math.floor(h),
                sourceData: extractRegion(page, x1, y1, w, h)
            });
            saveEditHistory();
        }
    } else if (state.editMode === 'erase' && currentStroke.points.length > 1) {
        page.editLayers.push({ ...currentStroke });
        saveEditHistory();
    }
    currentStroke = null;
    renderResult();
}

function extractRegion(page, x, y, w, h) {
    const srcW = page.purifiedWidth, srcH = page.purifiedHeight;
    const ix = Math.max(0, Math.floor(x));
    const iy = Math.max(0, Math.floor(y));
    const iw = Math.min(Math.floor(w), srcW - ix);
    const ih = Math.min(Math.floor(h), srcH - iy);
    const origCanvas = document.createElement('canvas');
    origCanvas.width = srcW; origCanvas.height = srcH;
    origCanvas.getContext('2d').putImageData(page.purifiedData, 0, 0);
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = iw; tempCanvas.height = ih;
    tempCanvas.getContext('2d').drawImage(origCanvas, ix, iy, iw, ih, 0, 0, iw, ih);
    return tempCanvas.getContext('2d').getImageData(0, 0, iw, ih);
}

function redrawEditOverlay() {
    editCtx.clearRect(0, 0, editOverlay.width, editOverlay.height);
    const page = currentPage();
    if (!page || !page.purified) return;
    const s = resultCanvas.width / page.purifiedWidth;
    page.editLayers.forEach(layer => {
        if (layer.type === 'protect') {
            editCtx.fillStyle = 'rgba(34, 197, 94, 0.25)';
            editCtx.strokeStyle = '#22c55e';
            editCtx.lineWidth = 2;
            editCtx.setLineDash([5, 3]);
            editCtx.fillRect(layer.x * s, layer.y * s, layer.width * s, layer.height * s);
            editCtx.strokeRect(layer.x * s, layer.y * s, layer.width * s, layer.height * s);
            editCtx.setLineDash([]);
        } else if (layer.type === 'erase') {
            editCtx.beginPath();
            layer.points.forEach((p, i) => i === 0 ? editCtx.moveTo(p.x * s, p.y * s) : editCtx.lineTo(p.x * s, p.y * s));
            editCtx.strokeStyle = 'rgba(249, 115, 22, 0.6)';
            editCtx.lineWidth = layer.size * s;
            editCtx.lineCap = 'round';
            editCtx.lineJoin = 'round';
            editCtx.stroke();
        }
    });
    if (currentStroke) {
        if (state.editMode === 'protect') {
            const x = Math.min(currentStroke.startX, currentStroke.endX) * s;
            const y = Math.min(currentStroke.startY, currentStroke.endY) * s;
            const w = Math.abs(currentStroke.endX - currentStroke.startX) * s;
            const h = Math.abs(currentStroke.endY - currentStroke.startY) * s;
            editCtx.fillStyle = 'rgba(34, 197, 94, 0.2)';
            editCtx.strokeStyle = '#22c55e';
            editCtx.lineWidth = 2;
            editCtx.setLineDash([5, 3]);
            editCtx.fillRect(x, y, w, h);
            editCtx.strokeRect(x, y, w, h);
            editCtx.setLineDash([]);
        } else if (state.editMode === 'erase') {
            editCtx.beginPath();
            currentStroke.points.forEach((p, i) => i === 0 ? editCtx.moveTo(p.x * s, p.y * s) : editCtx.lineTo(p.x * s, p.y * s));
            editCtx.strokeStyle = 'rgba(249, 115, 22, 0.6)';
            editCtx.lineWidth = currentStroke.size * s;
            editCtx.lineCap = 'round';
            editCtx.lineJoin = 'round';
            editCtx.stroke();
        }
    }
}

function undoEdit() {
    const page = currentPage();
    if (!page || page.editLayers.length === 0) return;
    if (state.editHistory.length > 0) {
        page.editLayers = state.editHistory.pop();
        renderResult();
    }
}

function clearAllEdits() {
    const page = currentPage();
    if (!page) return;
    saveEditHistory();
    page.editLayers = [];
    renderResult();
}

function finishEdit() {
    setEditMode(null);
    renderResult();
}

function saveEditHistory() {
    const page = currentPage();
    if (!page) return;
    state.editHistory.push([...page.editLayers]);
    if (state.editHistory.length > 20) state.editHistory.shift();
}

// ==================== 缩放 ====================
function applyZoom() {
    renderOriginal();
    renderResult();
}

// ==================== 撤销与恢复 ====================
function saveHistory() {
    const snapshot = JSON.stringify(state.pages.map(p => ({
        id: p.id, name: p.name, width: p.width, height: p.height,
        corners: p.corners.map(c=>({...c})), cornersModified: p.cornersModified,
        purified: p.purified, rotation: p.rotation,
        purifiedWidth: p.purifiedWidth, purifiedHeight: p.purifiedHeight
    })));
    state.history.push(snapshot); state.historyIndex = state.history.length - 1;
    if (state.history.length > 30) { state.history.shift(); state.historyIndex--; }
}

function undo() {
    if (state.historyIndex < 0 || state.history.length === 0) return;
    const snapshot = JSON.parse(state.history[state.historyIndex]); state.historyIndex--;
    snapshot.forEach((savedPage, idx) => {
        if (idx < state.pages.length) Object.assign(state.pages[idx], savedPage);
    });
    if (state.pages.length > 0 && state.currentIndex >= state.pages.length) state.currentIndex = state.pages.length - 1;
    renderOriginal(); renderResult(); updateThumbnails(); updateStatus(); updateToolbarInfo();
}

function currentPage() {
    return (state.currentIndex >= 0 && state.currentIndex < state.pages.length) ? state.pages[state.currentIndex] : null;
}

function resetCurrentPage() {
    const page = currentPage();
    if (!page) return;
    saveHistory();
    page.purified = false; page.purifiedData = null; page.editLayers = [];
    page.corners = [{ x:0,y:0 }, { x:page.width,y:0 }, { x:page.width,y:page.height }, { x:0,y:page.height }];
    page.cornersModified = false;
    renderOriginal(); renderResult(); updateStatus(); updateThumbnails();
}

function clearAll() {
    if (!confirm('确定要清除所有页面数据吗？此操作无法撤销。')) return;
    state.pages = []; state.currentIndex = -1; state.history = []; state.historyIndex = -1; state.editHistory = [];
    origCanvas.width = 0; resultCanvas.width = 0; editOverlay.width = 0; editOverlay.height = 0;
    cornerHandles.innerHTML = '';
    updateThumbnails(); updateStatus(); updateToolbarInfo();
    drawPlaceholder(origCanvas, '请导入试卷图片'); drawPlaceholder(resultCanvas, '净化结果显示区');
}

// ==================== 多页打印/导出 ====================
function downloadImage() {
    const page = currentPage();
    if (!page) { alert('没有可下载的页面'); return; }
    const canvas = document.createElement('canvas');
    if (page.purified && page.purifiedData) {
        canvas.width = page.purifiedWidth; canvas.height = page.purifiedHeight;
        const ctx = canvas.getContext('2d');
        ctx.putImageData(page.purifiedData, 0, 0);
        applyEditLayers(canvas, page);
    } else {
        canvas.width = page.width; canvas.height = page.height;
        canvas.getContext('2d').drawImage(page.originalImage, 0, 0);
    }
    const link = document.createElement('a');
    link.download = (page.name || 'page') + '_processed.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
}

function printPDF() {
    if (state.pages.length === 0) { alert('没有页面'); return; }
    const images = [];
    state.pages.forEach((page, idx) => {
        const canvas = document.createElement('canvas');
        if (page.purified && page.purifiedData) {
            canvas.width = page.purifiedWidth; canvas.height = page.purifiedHeight;
            const ctx = canvas.getContext('2d');
            ctx.putImageData(page.purifiedData, 0, 0);
            applyEditLayers(canvas, page);
        } else {
            canvas.width = page.width; canvas.height = page.height;
            canvas.getContext('2d').drawImage(page.originalImage, 0, 0);
        }
        images.push({ src: canvas.toDataURL('image/png'), name: page.name || `页${idx+1}` });
    });

    const w = window.open('', '_blank', 'width=800,height=600');
    let html = `<!DOCTYPE html><html><head><title>打印全部页面</title>
        <style>
            @page { size: ${state.paperSize.short}mm ${state.paperSize.long}mm; margin: 0; }
            body { margin: 0; }
            .page { page-break-after: always; display: flex; justify-content: center; align-items: center; height: 100vh; }
            .page:last-child { page-break-after: auto; }
            img { max-width: 100%; max-height: 100%; object-fit: contain; }
            @media print { img { object-fit: fill; width: 100%; height: 100%; } }
        </style></head><body>`;
    images.forEach(img => {
        html += `<div class="page"><img src="${img.src}" alt="${img.name}"></div>`;
    });
    html += '</body></html>';
    w.document.write(html);
    w.document.close();
}

function updateStatus() {
    const page = currentPage();
    document.getElementById('origStatus').textContent = page ? `${page.width}×${page.height}px | ${page.name}` : '请导入图片';
    document.getElementById('resultStatus').textContent = page && page.purified ? '已净化 | 可下载或打印' : (page ? '未净化 | 点击"净化当前页"' : '-');
    document.getElementById('purifyBadge').classList.toggle('hidden', !(page && page.purified));
}

init();
</script>
